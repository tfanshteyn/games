  ctx.moveTo(W/2 - gw/2 + 10, H * 0.24); ctx.lineTo(W/2 + gw/2 - 10, H * 0.24); // lower beam
  ctx.moveTo(W/2 - gw/2 + 20, H * 0.2); ctx.lineTo(W/2 - gw/2 + 20, H * 0.8); // left pillar
  ctx.moveTo(W/2 + gw/2 - 20, H * 0.2); ctx.lineTo(W/2 + gw/2 - 20, H * 0.8); // right pillar
  ctx.stroke();

  // Title
  ctx.shadowColor = '#cc2222';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#cc2222';
  ctx.font = `bold ${Math.min(60, W * 0.08)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('NEON CLASH', W / 2, H * 0.38);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#c8a060';
  ctx.font = `${Math.min(18, W * 0.03)}px sans-serif`;
  ctx.fillText('Feudal Arena Brawler', W / 2, H * 0.38 + 35);

  // Start prompt
  const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#eeddcc';
  ctx.font = `${Math.min(20, W * 0.035)}px sans-serif`;
  ctx.fillText(isTouchDevice ? 'Tap to Start' : 'Press any key to start', W / 2, H * 0.6);
  ctx.globalAlpha = 1;

  // High score
  ctx.fillStyle = '#887766';
  ctx.font = '14px sans-serif';
  ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.7);
  ctx.fillText(`Credits: ${credits}`, W / 2, H * 0.7 + 22);
}

// ---- Character Select ----
let charSelectButtons = [];
function drawCharSelect(W, H) {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(32, W * 0.05)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('SELECT CHARACTER', W / 2, 50);

  charSelectButtons = [];
  const cardW = Math.min(160, (W - 60) / 4 - 10);
  const cardH = cardW * 1.6;
  const startX = W / 2 - (CHARACTERS.length * (cardW + 10)) / 2 + 5;
  const cardY = (H - cardH) / 2;

  for (let i = 0; i < CHARACTERS.length; i++) {
    const c = CHARACTERS[i];
    const cx = startX + i * (cardW + 10);
    const unlocked = unlockedChars.includes(c.id);

    charSelectButtons.push({ x: cx, y: cardY, w: cardW, h: cardH, charIdx: i, unlocked: unlocked });

    // Card background
    ctx.fillStyle = selectedChar.id === c.id ? c.color + '22' : '#161628';
    ctx.strokeStyle = selectedChar.id === c.id ? c.color : '#2a2a40';
    ctx.lineWidth = selectedChar.id === c.id ? 2 : 1;
    ctx.fillRect(cx, cardY, cardW, cardH);
    ctx.strokeRect(cx, cardY, cardW, cardH);

    if (!unlocked) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(cx, cardY, cardW, cardH);
    }

    // Character preview — draw using shared brawler body (facing right)
    ctx.save();
    if (!unlocked) ctx.globalAlpha = 0.4;
    const previewScale = cardW / 130;
    const previewX = cx + cardW / 2;
    const previewY = cardY + cardW / 2;
    ctx.save();
    ctx.translate(previewX, previewY);
    ctx.scale(previewScale, previewScale);
    // Draw at origin facing right, with idle animation
    drawBrawlerBody(0, 0, 0, 20, c.id, c.color, c.accent, { walkPhase: frameCount * 0.06, alpha: unlocked ? 1 : 0.4 });
    ctx.restore();
    ctx.restore();

    // Name
    ctx.fillStyle = unlocked ? '#fff' : '#666';
    ctx.font = `bold ${Math.min(14, cardW * 0.09)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(c.name, cx + cardW / 2, cardY + cardW + 10);

    // Desc
    ctx.fillStyle = unlocked ? '#999' : '#555';
    ctx.font = `${Math.min(11, cardW * 0.07)}px sans-serif`;
    ctx.fillText(c.desc, cx + cardW / 2, cardY + cardW + 26);

    // Stats
    const statY = cardY + cardW + 36;
    const statFont = `${Math.min(10, cardW * 0.065)}px sans-serif`;
    ctx.font = statFont;
    ctx.textAlign = 'left';
    const statX = cx + 8;
    ctx.fillStyle = unlocked ? '#aaa' : '#555';
    ctx.fillText(`HP: ${c.hp}`, statX, statY);
    ctx.fillText(`SPD: ${c.speed}`, statX, statY + 13);
    ctx.fillText(`DMG: ${c.bulletDmg}`, statX, statY + 26);
    ctx.fillText(`${c.specialName}`, statX, statY + 39);

    // Lock / cost
    if (!unlocked) {
      ctx.fillStyle = '#ffaa00';
      ctx.font = `bold ${Math.min(14, cardW * 0.09)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(`${c.cost} CR`, cx + cardW / 2, cardY + cardH - 15);
    }
  }

  // Play button
  const btnW = 180, btnH = 44;
  const btnX = W / 2 - btnW / 2, btnY = H - 70;
  const canPlay = unlockedChars.includes(selectedChar.id);
  ctx.fillStyle = canPlay ? selectedChar.color + '44' : '#222';
  ctx.strokeStyle = canPlay ? selectedChar.color : '#444';
  ctx.lineWidth = 2;
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = canPlay ? '#fff' : '#666';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(canPlay ? 'PLAY' : 'LOCKED', W / 2, btnY + 28);
  charSelectButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, action: 'play' });

  // Credits
  ctx.fillStyle = '#888';
  ctx.font = '13px sans-serif';
  ctx.fillText(`Credits: ${credits}`, W / 2, H - 10);
}

function handleCharSelectClick(cx, cy) {
  for (const btn of charSelectButtons) {
    if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
      if (btn.action === 'play') {
        if (unlockedChars.includes(selectedChar.id)) {
          startGame();
        }
      } else if (btn.charIdx !== undefined) {
        const c = CHARACTERS[btn.charIdx];
        if (unlockedChars.includes(c.id)) {
          selectedChar = c;
        } else if (credits >= c.cost) {
          credits -= c.cost;
          unlockedChars.push(c.id);
          selectedChar = c;
          saveData();
          sfx.buy();
        }
      }
    }
  }
}

// ---- Shop ----
function drawShop(W, H) {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(28, W * 0.045)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave} COMPLETE!`, W / 2, 50);

  ctx.fillStyle = '#aaa';
  ctx.font = '14px sans-serif';
  ctx.fillText(`Credits: ${runCredits}`, W / 2, 75);

  shopButtons = [];
  const rowH = 60;
  const startY = 110;
  const maxW = Math.min(500, W - 40);
  const sx = (W - maxW) / 2;

  for (let i = 0; i < UPGRADE_DEFS.length; i++) {
    const def = UPGRADE_DEFS[i];
    const y = startY + i * (rowH + 10);
    const cost = getUpgradeCost(def);
    const atMax = upgrades[def.key] >= def.maxLevel;
    const canBuy = !atMax && runCredits >= cost;

    // Row background
    ctx.fillStyle = '#161628';
    ctx.strokeStyle = '#2a2a40';
    ctx.lineWidth = 1;
    ctx.fillRect(sx, y, maxW, rowH);
    ctx.strokeRect(sx, y, maxW, rowH);

    // Icon
    ctx.fillStyle = selectedChar.color;
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.icon, sx + 30, y + 38);

    // Name + desc
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(def.name, sx + 60, y + 22);
    ctx.fillStyle = '#888';
    ctx.font = '12px sans-serif';
    ctx.fillText(def.desc, sx + 60, y + 40);

    // Level pips
    const pipX = sx + maxW - 160;
    for (let j = 0; j < def.maxLevel; j++) {
      ctx.fillStyle = j < upgrades[def.key] ? selectedChar.color : '#333';
      ctx.fillRect(pipX + j * 16, y + 15, 12, 12);
    }

    // Buy button
    if (!atMax) {
      const btnW = 80, btnH = 32;
      const btnX = sx + maxW - btnW - 10, btnY = y + (rowH - btnH) / 2;
      ctx.fillStyle = canBuy ? selectedChar.color + '44' : '#1a1a2a';
      ctx.strokeStyle = canBuy ? selectedChar.color : '#333';
      ctx.lineWidth = 1;
      ctx.fillRect(btnX, btnY, btnW, btnH);
      ctx.strokeRect(btnX, btnY, btnW, btnH);
      ctx.fillStyle = canBuy ? '#fff' : '#555';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${cost} CR`, btnX + btnW / 2, btnY + 20);
      shopButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, action: 'buy', idx: i });
    } else {
      ctx.fillStyle = '#44ff66';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('MAX', sx + maxW - 20, y + 38);
    }
  }

  // Continue button
  const btnW = 200, btnH = 48;
  const btnX = W / 2 - btnW / 2, btnY = startY + UPGRADE_DEFS.length * (rowH + 10) + 20;
  ctx.fillStyle = '#cc222233';
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 2;
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = '#eeddcc';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT WAVE', W / 2, btnY + 30);
  shopButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, action: 'continue' });
}

function handleShopClick(cx, cy) {
  for (const btn of shopButtons) {
    if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
      if (btn.action === 'buy') {
        const def = UPGRADE_DEFS[btn.idx];
        const cost = getUpgradeCost(def);
        if (upgrades[def.key] < def.maxLevel && runCredits >= cost) {
          runCredits -= cost;
          upgrades[def.key]++;
          // Apply immediately
          player.maxHp = selectedChar.hp + upgrades.maxHp;
          player.hp = player.maxHp;
          player.speed = selectedChar.speed + upgrades.speed * 0.4;
          player.bulletDmg = selectedChar.bulletDmg + upgrades.damage * 0.5;
          player.specialCd = Math.max(120, selectedChar.specialCd - upgrades.specialCd * 80);
          sfx.buy();
        }
      } else if (btn.action === 'continue') {
        closeShop();
      }
    }
  }
}

// ---- Game Over ----
function drawGameOver(W, H) {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowColor = '#ff2244';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff2244';
  ctx.font = `bold ${Math.min(48, W * 0.08)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('DEFEATED', W / 2, H * 0.35);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '20px sans-serif';
  ctx.fillText(`Score: ${score}`, W / 2, H * 0.45);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px sans-serif';
  ctx.fillText(`Wave: ${wave}/${MAX_WAVE}`, W / 2, H * 0.52);
  ctx.fillText(`Credits earned: ${runCredits}`, W / 2, H * 0.58);
  ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.64);

  const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText(isTouchDevice ? 'Tap to continue' : 'Press SPACE to continue', W / 2, H * 0.75);
  ctx.globalAlpha = 1;
}

// ---- Victory ----
function drawVictory(W, H) {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowColor = '#eebb44';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#eebb44';
  ctx.font = `bold ${Math.min(48, W * 0.08)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', W / 2, H * 0.3);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '20px sans-serif';
  ctx.fillText(`Score: ${score}`, W / 2, H * 0.42);
  ctx.fillStyle = '#ffaa00';
  ctx.fillText(`Credits earned: ${runCredits}`, W / 2, H * 0.49);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px sans-serif';
  ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.56);

  // Animated particles
  if (frameCount % 5 === 0) {
    const colors = ['#cc2222', '#eebb44', '#ff88aa', '#ffaa00'];
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: rnd(0, W), y: H + 10,
        vx: rnd(-1, 1), vy: rnd(-3, -1),
        life: rnd(40, 80), color: colors[Math.floor(Math.random() * colors.length)], radius: rnd(2, 5)
      });
    }
  }
  // Draw victory particles in screen space
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.life--;
    ctx.globalAlpha = p.life / 80;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Clean up
  for (let i = particles.length - 1; i >= 0; i--) { if (particles[i].life <= 0) particles.splice(i, 1); }

  const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText(isTouchDevice ? 'Tap to continue' : 'Press SPACE to continue', W / 2, H * 0.7);
  ctx.globalAlpha = 1;
}

// ---- Main loop ----
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
