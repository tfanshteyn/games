    image-rendering: pixelated;

<script>
// ============================================================
//  NEON RUNNER — A Mario-style Platformer with Neon Aesthetics
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 1920, H = 1080;
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
ctx.scale(dpr, dpr);

function resize() {
  const scaleX = window.innerWidth * 0.96 / W;
  const scaleY = window.innerHeight * 0.94 / H;
  const scale = Math.min(scaleX, scaleY, 1.5);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
//  AUDIO ENGINE
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, dur, type = 'square', vol = 0.07) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

const sfx = {
  jump: () => { playTone(500, 0.1, 'sine', 0.1); setTimeout(() => playTone(700, 0.08, 'sine', 0.07), 40); },
  stomp: () => { playTone(300, 0.08, 'square', 0.1); setTimeout(() => playTone(600, 0.12, 'sine', 0.08), 30); },
  coin: () => { playTone(1200, 0.06, 'sine', 0.1); setTimeout(() => playTone(1600, 0.08, 'sine', 0.08), 50); },
  powerup: () => { [0,50,100,150].forEach((d,i) => setTimeout(() => playTone(500+i*200, 0.1, 'sine', 0.07), d)); },
  hit: () => { playTone(150, 0.25, 'sawtooth', 0.1); playTone(90, 0.3, 'square', 0.06); },
  die: () => { [0,100,200,300].forEach((d,i) => setTimeout(() => playTone(400-i*80, 0.15, 'square', 0.06), d)); },
  complete: () => { [0,100,200,300,400,500].forEach((d,i) => setTimeout(() => playTone(400+i*100, 0.2, 'triangle', 0.08), d)); },
  brick: () => { playTone(200, 0.05, 'square', 0.05); },
  spring: () => { playTone(300, 0.05, 'sine', 0.08); setTimeout(() => playTone(900, 0.15, 'sine', 0.1), 30); },
  flag: () => { [0,80,160,240,320,400,480,560].forEach((d,i) => setTimeout(() => playTone(500+i*50, 0.12, 'triangle', 0.06), d)); },
};

// ============================================================
//  GAME STATE
// ============================================================
let state = 'menu'; // menu, playing, dead, levelComplete
let lives = 3;
let coins = 0;
let score = 0;
let currentLevel = 0;
let frameCount = 0;
let screenShake = 0;
let deadTimer = 0;
let completeTimer = 0;
let invincibleTimer = 0;
let starTimer = 0;

// Camera
let camX = 0;
let camTarget = 0;

// ============================================================
//  INPUT
// ============================================================
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (state === 'menu' && !transition.active && (e.code === 'Space' || e.code === 'Enter')) {
    ensureAudio();
    startTransition(() => startLevel(0), 'iris');
  }
  if (state === 'dead' && deadTimer > 50 && !transition.active && (e.code === 'Space' || e.code === 'Enter')) {
    if (lives > 0) startTransition(() => startLevel(currentLevel), 'fade');
    else startTransition(() => { lives = 3; coins = 0; score = 0; startLevel(0); }, 'iris');
  }
  if (state === 'levelComplete' && completeTimer > 80 && !transition.active && (e.code === 'Space' || e.code === 'Enter')) {
    startTransition(() => startLevel(currentLevel + 1), 'iris');
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function isDown(action) {
  switch(action) {
    case 'left': return keys['ArrowLeft'] || keys['KeyA'];
    case 'right': return keys['ArrowRight'] || keys['KeyD'];
    case 'jump': return keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
    case 'run': return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX'];
  }
}
function wasPressed(action) {
  switch(action) {
    case 'jump': return justPressed['Space'] || justPressed['ArrowUp'] || justPressed['KeyW'];
  }
}

// ============================================================
//  TILE SYSTEM
// ============================================================
const T = 64; // tile size
const TILES = {
  '.': 'air',
  '#': 'ground',
  'B': 'brick',
  '?': 'question',
  'P': 'pipe_top',
  'p': 'pipe_body',
  'S': 'spike',
  'G': 'goal',
  '-': 'platform', // one-way platform
  '^': 'spring',
  'L': 'lava',
};

// Entity markers (placed via level data, removed from tiles)
const ENTITY_MARKERS = {
  '@': 'player_spawn',
  'c': 'coin',
  'e': 'enemy_walk',
  'f': 'enemy_fly',
  'j': 'enemy_jump',
  '*': 'powerup_star',
  'm': 'powerup_mushroom',
  'F': 'flag',
};

let levelTiles = [];
let levelW = 0;
let levelH = 0;
let entities = [];
let particles = [];
let questionBlocks = []; // track ? block states
let brickDebris = [];
let floatingTexts = [];
let flagReached = false;

// ============================================================
//  PLAYER
// ============================================================
const player = {
  x: 0, y: 0, w: 48, h: 64,
  vx: 0, vy: 0,
  grounded: false,
  facing: 1,
  big: false,
  running: false,
  animFrame: 0,
  animTimer: 0,
  coyoteTime: 0,
  jumpBuffered: false,
  jumpBufferTimer: 0,
  walkCycle: 0,
  dead: false,
  deadVy: 0,
  wallSliding: false,
  wallDir: 0,         // -1 = wall on left, 1 = wall on right
  wallJumpTimer: 0,   // briefly override input after wall jump
};

// ============================================================
//  LEVELS
// ============================================================
const levels = [];

// LEVEL 1 — Tutorial: flat ground, coins, no enemies, no gaps
levels.push(`

....................................................................................

...@..........................................................##.....G.............
###################..##########..##########..##########..##########..##..####.......
###################..###############################################################
###################..###############################################################
`);

// LEVEL 2 — Small gaps, a few coins, one easy enemy
levels.push(`

....................................................................................
..........c.c.c..........c.c.c..........c.c.c...........F.........................
.........-------.........-------.......?c?c?c?..........###........................

################...##############..########..##########.##..............G...........
################...##############..##########.##########.##...########..............
################...##############..######################.##...########.............
`);

// LEVEL 3 — Sky platforms
levels.push(`
....................................................................................
....................................................................................
...............c............c.c.c.........c...c...c..........F......................
..............---.......---------.........----------........###.....................
.......c.c..........c.........................................e.....................

########..........######..####..####..####..####..####..####.##..#####..............
########..LLLLLL..######..##########..########..........########..#####.............
`);

// LEVEL 4 — The gauntlet
levels.push(`
....................................................................................
....................................................................................
....................................................................................
....................c...c...c.......c.c.c.c........c...c...c.....F.................
.........c.c......---..---..---....---------......---.---.---...###................
........------.......................................e.e.e..............................
..........e.e....?*?....e.e....?c?c?....e.e....?*?....e.......####................
...@...e.......####..e.......####..####.......####..........e..###..G...............
####.e....####........####.........e....####.........####..####..##..####...........
#######...######..########...########...######..########..####..##..#####..........
#######...######..########...########...######..########..####..#########..........
......LLLLLL..........LLLLLL......LLLLLL..........LLLLLL.......LLLLLL..............
`);

// LEVEL 5 — Final challenge
levels.push(`
....................................................................................
....................................................................................
..c.c.c.c.c........c.c.c..........c.c.c.c.........c.c.c.c........F...............
.-----------......---------.......----------......----------.....###...............
.......................................e.e..........e.e.e.........e.................
..e.e.e.e.....?*?c?*?.e.e.e...?c?c?c?.........?*?c?*?c?.....#####................
...........e.........e.......e..........e....e...........e....##....................
...@....####..####..####..####..####..####..####..####..####.##....................
####..e.....e.....e.....e.....e.....e.....e.....e.....e.....##.......G.............
########..########..########..########..########..########..###..######.............
########..########..########..########..########..########..####..######............
....LLLLLLLLLL..LLLLLLLLLL..LLLLLLLLLL..LLLLLLLLLL..LLLLLLLLLL....................
`);


function parseLevel(idx) {
  if (idx >= levels.length) idx = levels.length - 1;
  currentLevel = idx;

  const raw = levels[idx].split('\n').filter(l => l.length > 0);
  levelH = raw.length;
  levelW = Math.max(...raw.map(r => r.length));
  levelTiles = [];
  entities = [];
  particles = [];
  questionBlocks = [];
  brickDebris = [];
  floatingTexts = [];
  flagReached = false;

  let spawnX = 2, spawnY = 2;

  for (let row = 0; row < levelH; row++) {
    levelTiles[row] = [];
    for (let col = 0; col < levelW; col++) {
      const ch = (raw[row] && raw[row][col]) || '.';

      if (ENTITY_MARKERS[ch]) {
        levelTiles[row][col] = '.';
        const ex = col * T + T/2;
        const ey = row * T + T/2;

        switch(ENTITY_MARKERS[ch]) {
          case 'player_spawn': spawnX = col * T + 4; spawnY = row * T; break;
          case 'coin': entities.push(createCoin(ex - T/2, ey - T/2)); break;
          case 'enemy_walk': entities.push(createEnemy(ex - T/2, ey - T/2, 'walk')); break;
          case 'enemy_fly': entities.push(createEnemy(ex - T/2, ey - T/2, 'fly')); break;
          case 'enemy_jump': entities.push(createEnemy(ex - T/2, ey - T/2, 'jump')); break;
          case 'powerup_star': entities.push({ type: 'hidden_star', x: col, y: row }); break;
          case 'powerup_mushroom': entities.push({ type: 'hidden_mushroom', x: col, y: row }); break;
          case 'flag': entities.push(createFlag(col * T, ey - T/2)); break;
        }
      } else {
        levelTiles[row][col] = ch;
        if (ch === '?') {
          questionBlocks.push({ col, row, hit: false, content: 'coin' });
        }
      }
    }
  }

  // Setup player
  player.x = spawnX;
  player.y = spawnY;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;
  player.facing = 1;
  player.dead = false;
  player.coyoteTime = 0;

  camX = Math.max(0, player.x - W * 0.3);
}

function createCoin(x, y) {
  return { type: 'coin', x, y, w: 40, h: 40, collected: false, animPhase: Math.random() * Math.PI * 2, floatBase: y };
}

function createEnemy(x, y, style) {
  return {
    type: 'enemy', style, x, y: y, w: 56, h: 56,
    vx: -2.4, vy: 0,
    alive: true, squished: false, squishTimer: 0, eatingTimer: 0,
    animPhase: Math.random() * Math.PI * 2,
    flyBase: y, flyPhase: Math.random() * Math.PI * 2,
    jumpTimer: style === 'jump' ? Math.random() * 100 : 0,
    grounded: false,
  };
}

function createFlag(x, y) {
  return { type: 'flag', x, y: y - T * 3, w: 16, h: T * 4, poleHeight: T * 4 };
}

// ============================================================
//  COLLISION HELPERS
// ============================================================
function getTile(col, row) {
  if (row < 0 || row >= levelH || col < 0 || col >= levelW) return '.';
  return levelTiles[row]?.[col] || '.';
}

function isSolid(col, row) {
  const t = getTile(col, row);
  return t === '#' || t === 'B' || t === '?' || t === 'P' || t === 'p';
}

function isPlatform(col, row) {
  return getTile(col, row) === '-';
}

function isHazard(col, row) {
  const t = getTile(col, row);
  return t === 'S' || t === 'L';
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
//  PHYSICS & LOGIC
// ============================================================
const GRAVITY = 0.9;
const MAX_FALL = 18;
const WALK_SPEED = 5.6;
const RUN_SPEED = 9;
const JUMP_FORCE = -19;
const FRICTION = 0.82;
const AIR_FRICTION = 0.92;
const ACCEL = 1.0;
const WALL_SLIDE_SPEED = 3.6;
const WALL_JUMP_FORCE_X = 11;
const WALL_JUMP_FORCE_Y = -17;

// ============================================================
//  SCREEN TRANSITIONS
// ============================================================
let transition = {
  active: false,
  type: 'none',     // 'iris-close', 'iris-open', 'fade-out', 'fade-in'
  timer: 0,
  duration: 30,
  callback: null,    // called at midpoint (between close and open)
  phase: 'out',      // 'out' = closing, 'in' = opening
};

function startTransition(callback, type = 'iris') {
  transition.active = true;
  transition.timer = 0;
  transition.duration = type === 'iris' ? 28 : 22;
  transition.phase = 'out';
  transition.type = type;
  transition.callback = callback;
}

function updateTransition() {
  if (!transition.active) return;
  transition.timer++;

  if (transition.phase === 'out' && transition.timer >= transition.duration) {
    // Midpoint — execute the callback (level load, etc.)
    if (transition.callback) transition.callback();
    transition.callback = null;
    transition.phase = 'in';
    transition.timer = 0;
  }

  if (transition.phase === 'in' && transition.timer >= transition.duration) {
    transition.active = false;
    transition.type = 'none';
  }
}

function drawTransition() {
  if (!transition.active) return;

  const progress = transition.timer / transition.duration;

  if (transition.type === 'iris') {
    // Circle iris wipe — classic Mario style
    const maxR = Math.sqrt(W * W + H * H) / 2;
    let radius;
    if (transition.phase === 'out') {
      radius = maxR * (1 - progress);
    } else {
      radius = maxR * progress;
    }
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.arc(W / 2, H / 2, Math.max(0, radius), 0, Math.PI * 2, true);
    ctx.fill();
    ctx.restore();
  } else {
    // Fade
    let alpha;
    if (transition.phase === 'out') {
      alpha = progress;
    } else {
      alpha = 1 - progress;
    }
    ctx.save();
    ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function startLevel(idx) {
  parseLevel(idx);
  state = 'playing';
  deadTimer = 0;
  completeTimer = 0;
  invincibleTimer = 0;
}

function update() {
  frameCount++;

  // Always update transitions and particles
  updateTransition();
  updateParticles();

  if (state === 'dead') { deadTimer++; return; }
  if (state === 'levelComplete') { completeTimer++; return; }
  if (state !== 'playing') return;

  if (screenShake > 0) screenShake *= 0.88;
  if (screenShake < 0.2) screenShake = 0;
  if (invincibleTimer > 0) invincibleTimer--;
  if (starTimer > 0) starTimer--;

  updatePlayer();
  updateEntities();
  updateCamera();

  // Clear justPressed
  for (const k in justPressed) justPressed[k] = false;
}

function touchingWall(obj, dir) {
  // Check if obj is pressed against a wall on the given side (-1=left, 1=right)
  const top = Math.floor(obj.y / T);
  const bot = Math.floor((obj.y + obj.h - 1) / T);
  const col = dir === -1
    ? Math.floor((obj.x - 1) / T)
    : Math.floor((obj.x + obj.w) / T);
  for (let r = top; r <= bot; r++) {
    if (isSolid(col, r)) return true;
  }
  return false;
}

function updatePlayer() {
  if (player.dead) return;

  const maxSpeed = isDown('run') ? RUN_SPEED : WALK_SPEED;

  // Wall jump timer — briefly limits input control after wall jump
  if (player.wallJumpTimer > 0) player.wallJumpTimer--;

  // Horizontal movement
  if (player.wallJumpTimer <= 0) {
    if (isDown('left')) {
      player.vx -= ACCEL;
      player.facing = -1;
    } else if (isDown('right')) {
      player.vx += ACCEL;
      player.facing = 1;
    }
  }

  player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

  if (!isDown('left') && !isDown('right') && player.wallJumpTimer <= 0) {
    player.vx *= player.grounded ? FRICTION : AIR_FRICTION;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Jump buffering
  if (wasPressed('jump')) {
    player.jumpBuffered = true;
    player.jumpBufferTimer = 8;
  }
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;
  else player.jumpBuffered = false;

  // Coyote time
  if (player.grounded) player.coyoteTime = 6;
  else if (player.coyoteTime > 0) player.coyoteTime--;

  // Wall slide detection
  player.wallSliding = false;
  player.wallDir = 0;
  if (!player.grounded && player.vy > 0) {
    if (isDown('left') && touchingWall(player, -1)) {
      player.wallSliding = true;
      player.wallDir = -1;
    } else if (isDown('right') && touchingWall(player, 1)) {
      player.wallSliding = true;
      player.wallDir = 1;
    }
  }

  // Jump — ground jump, wall jump, or coyote jump
  if (player.jumpBuffered) {
    if (player.grounded || player.coyoteTime > 0) {
      // Normal jump
      player.vy = JUMP_FORCE;
      player.grounded = false;
      player.coyoteTime = 0;
      player.jumpBuffered = false;
      sfx.jump();
      emit(player.x + player.w/2, player.y + player.h, '#44BB44', 6, 2, 15);
    } else if (player.wallSliding) {
      // Wall jump — launch away from wall
      player.vy = WALL_JUMP_FORCE_Y;
      player.vx = -player.wallDir * WALL_JUMP_FORCE_X;
      player.facing = -player.wallDir;
      player.wallSliding = false;
      player.jumpBuffered = false;
      player.wallJumpTimer = 8;
      sfx.jump();
      emit(player.x + player.w/2 + player.wallDir * 10, player.y + player.h/2, '#44BB44', 8, 2, 18);
    }
  }

  // Wall slide — cap fall speed
  if (player.wallSliding) {
    if (player.vy > WALL_SLIDE_SPEED) player.vy = WALL_SLIDE_SPEED;
    // Wall slide particles
    if (frameCount % 4 === 0) {
      const wx = player.wallDir === -1 ? player.x : player.x + player.w;
      emit(wx, player.y + player.h * 0.6, '#44BB4488', 3, 1, 10);
    }
  }

  // Variable jump height
  if (!isDown('jump') && player.vy < -3) {
    player.vy *= 0.85;
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Move X
  player.x += player.vx;
  resolveCollisionX(player);

  // Move Y
  const wasGrounded = player.grounded;
  player.grounded = false;
  player.y += player.vy;
  resolveCollisionY(player);

  // Fell into pit
  if (player.y > levelH * T + 100) {
    killPlayer();
  }

  // Hazard check
  const cx1 = Math.floor((player.x + 4) / T);
  const cx2 = Math.floor((player.x + player.w - 4) / T);
  const cy1 = Math.floor((player.y + 4) / T);
  const cy2 = Math.floor((player.y + player.h - 2) / T);
  for (let r = cy1; r <= cy2; r++) {
    for (let c = cx1; c <= cx2; c++) {
      if (isHazard(c, r)) {
        if (starTimer > 0) continue;
        killPlayer();
        return;
      }
    }
  }

  // Walk animation
  if (player.grounded && Math.abs(player.vx) > 0.3) {
    player.walkCycle += Math.abs(player.vx) * 0.12;
  }

  // Running trail
  if (Math.abs(player.vx) > 3.5 && player.grounded && frameCount % 3 === 0) {
    emitTrail(player.x + player.w/2, player.y + player.h, '#44BB4444');
  }

  // Star sparkles
  if (starTimer > 0 && frameCount % 2 === 0) {
    emit(player.x + Math.random() * player.w, player.y + Math.random() * player.h,
      ['#ff0', '#f0f', '#0ff', '#0f0'][Math.floor(Math.random()*4)], 1, 1, 15);
  }

  // Keep in bounds
  if (player.x < 0) { player.x = 0; player.vx = 0; }
}

function resolveCollisionX(obj) {
  const top = Math.floor(obj.y / T);
  const bot = Math.floor((obj.y + obj.h - 1) / T);

  // Left
  const leftCol = Math.floor(obj.x / T);
  for (let r = top; r <= bot; r++) {
    if (isSolid(leftCol, r)) {
      obj.x = (leftCol + 1) * T;
      obj.vx = 0;
      break;
    }
  }

  // Right
  const rightCol = Math.floor((obj.x + obj.w - 1) / T);
  for (let r = top; r <= bot; r++) {
    if (isSolid(rightCol, r)) {
      obj.x = rightCol * T - obj.w;
      obj.vx = 0;
      break;
    }
  }
}

function resolveCollisionY(obj) {
  const left = Math.floor((obj.x + 2) / T);
  const right = Math.floor((obj.x + obj.w - 3) / T);

  if (obj.vy >= 0) {
    // Falling — check below
    const botRow = Math.floor((obj.y + obj.h) / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(c, botRow)) {
        obj.y = botRow * T - obj.h;
        obj.vy = 0;
        obj.grounded = true;
        return;
      }
      // One-way platforms (only when falling through from above)
      if (isPlatform(c, botRow)) {
        const prevBot = obj.y + obj.h - obj.vy;
        if (prevBot <= botRow * T + 2) {
          obj.y = botRow * T - obj.h;
          obj.vy = 0;
          obj.grounded = true;
          return;
        }
      }
    }
  } else {
    // Rising — check above (head bonk)
    const topRow = Math.floor(obj.y / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(c, topRow)) {
        obj.y = (topRow + 1) * T;
        obj.vy = 0;

        // Hit block from below
        if (obj === player) hitBlock(c, topRow);
        return;
      }
    }
  }
}

function hitBlock(col, row) {
  const tile = getTile(col, row);

  if (tile === '?') {
    const qb = questionBlocks.find(q => q.col === col && q.row === row && !q.hit);
    if (qb) {
      qb.hit = true;
      sfx.coin();
      screenShake = 3;

      // Check for hidden content
      const hidden = entities.find(e =>
        (e.type === 'hidden_star' || e.type === 'hidden_mushroom') && e.x === col && e.y === row
      );

      if (hidden) {
        if (hidden.type === 'hidden_star') {
          starTimer = 600; // 10 seconds of invincibility
          sfx.powerup();
          addFloatingText(col * T + T/2, row * T - 10, 'STAR!', '#ffff00');
          emit(col * T + T/2, row * T, '#ffff00', 15, 3, 30);
        } else {
          // Mushroom — grow big or extra life
          if (!player.big) {
            player.big = true;
            player.h = 44;
            player.y -= 12;
            sfx.powerup();
            addFloatingText(col * T + T/2, row * T - 10, 'BIG!', '#ff4488');
          } else {
            lives++;
            sfx.powerup();
            addFloatingText(col * T + T/2, row * T - 10, '1UP!', '#00ff88');
          }
          emit(col * T + T/2, row * T, '#ff4488', 12, 3, 25);
        }
        entities = entities.filter(e => e !== hidden);
      } else {
        // Regular coin from ? block
        coins++;
        score += 100;
        addFloatingText(col * T + T/2, row * T - 10, '+100', '#ffff00');
        emit(col * T + T/2, row * T, '#ffff00', 8, 2, 20);
      }
    }
  } else if (tile === 'B') {
    if (player.big) {
      // Break brick
      levelTiles[row][col] = '.';
      sfx.brick();
      screenShake = 4;
      score += 50;
      // Debris
      for (let i = 0; i < 6; i++) {
        brickDebris.push({
          x: col * T + Math.random() * T,
          y: row * T + Math.random() * T,
          vx: (Math.random() - 0.5) * 5,
          vy: -Math.random() * 6 - 2,
          size: 6 + Math.random() * 6,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.3,
          life: 60,
        });
      }
    } else {
      sfx.brick();
      screenShake = 2;
      // Bump animation via particles
      emit(col * T + T/2, row * T + T, '#ff660044', 4, 1, 10);
    }
  }
}

function killPlayer() {
  if (invincibleTimer > 0 || starTimer > 0) return;
  if (player.dead) return;

  if (player.big) {
    player.big = false;
    player.h = 32;
    invincibleTimer = 90;
    sfx.hit();
    screenShake = 8;
    emit(player.x + player.w/2, player.y + player.h/2, '#ff0044', 15, 3, 25);
    return;
  }

  player.dead = true;
  player.vy = -16;
  lives--;
  sfx.die();
  screenShake = 15;
  emit(player.x + player.w/2, player.y + player.h/2, '#ff0044', 25, 4, 40);

  setTimeout(() => {
    state = 'dead';
    deadTimer = 0;
  }, 800);
}

// ============================================================
//  ENTITIES
// ============================================================
function updateEntities() {
  for (const e of entities) {
    if (e.type === 'coin' && !e.collected) {
      e.animPhase += 0.06;
      e.y = e.floatBase + Math.sin(e.animPhase) * 3;

      // Collect
      if (rectOverlap(player, e)) {
        e.collected = true;
        coins++;
        score += 100;
        sfx.coin();
        emit(e.x + e.w/2, e.y + e.h/2, '#ffff00', 8, 2, 20);
        addFloatingText(e.x + e.w/2, e.y, '+100', '#ffff00');
        if (coins % 50 === 0) {
          lives++;
          sfx.powerup();
          addFloatingText(e.x + e.w/2, e.y - 20, '1UP!', '#00ff88');
        }
      }
    }

    if (e.type === 'enemy' && e.alive) {
      if (e.eatingTimer > 0) e.eatingTimer--;
      // Check if enemy overlaps a bone (coin)
      for (const c of entities) {
        if (c.type === 'coin' && !c.collected && rectOverlap(e, c)) {
          c.collected = true;
          e.eatingTimer = 50;
          emit(c.x + c.w/2, c.y + c.h/2, '#F5E6D0', 12, 3, 20);
          addFloatingText(e.x + e.w/2, e.y - 20, 'CHOMP!', '#FFD700');
        }
      }
      // Fire breath while eating
      if (e.eatingTimer > 0 && frameCount % 2 === 0) {
        const dir = e.vx >= 0 ? 1 : -1;
        const fx = e.x + e.w/2 + dir * 28;
        const fy = e.y + e.h/2 - 8;
        const fireColors = ['#FF4400', '#FF8800', '#FFCC00', '#FFEE66'];
        for (let i = 0; i < 4; i++) {
          const col = fireColors[Math.floor(Math.random() * fireColors.length)];
          particles.push({
            x: fx, y: fy + (Math.random() - 0.5) * 12,
            vx: dir * (4 + Math.random() * 6),
            vy: -2 - Math.random() * 4,
            size: 6 + Math.random() * 8,
            life: 15 + Math.random() * 12,
            maxLife: 27,
            color: col,
          });
        }
      }
      updateEnemy(e);
    }

    if (e.type === 'enemy' && e.squished) {
      e.squishTimer--;
      if (e.squishTimer <= 0) e.dead = true;
    }

    if (e.type === 'flag') {
      // Flag collision
      if (!flagReached && rectOverlap(player, { x: e.x - 20, y: e.y, w: 56, h: e.poleHeight })) {
        flagReached = true;
        const timeBonus = 500;
        score += timeBonus;
        sfx.flag();
        addFloatingText(e.x, e.y, `+${timeBonus}`, '#ffff00');

        setTimeout(() => {
          state = 'levelComplete';
          completeTimer = 0;
          sfx.complete();
        }, 500);
      }
    }
  }

  entities = entities.filter(e => {
    if (e.type === 'coin' && e.collected) return false;
    if (e.type === 'enemy' && e.dead) return false;
    if (e.type === 'enemy' && e.y > levelH * T + 200) return false;
    return true;
  });
}

function updateEnemy(e) {
  // Pause movement while eating
  if (e.eatingTimer > 0) { e.animPhase += 0.08; return; }

  if (e.style === 'fly') {
    e.flyPhase += 0.03;
    e.y = e.flyBase + Math.sin(e.flyPhase) * 80;
    e.x += e.vx;
    e.animPhase += 0.08;
  } else {
    // Gravity
    e.vy += GRAVITY;
    if (e.vy > MAX_FALL) e.vy = MAX_FALL;
    e.y += e.vy;

    // Resolve Y
    e.grounded = false;
    const left = Math.floor(e.x / T);
    const right = Math.floor((e.x + e.w - 1) / T);
    const botRow = Math.floor((e.y + e.h) / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(c, botRow) || isPlatform(c, botRow)) {
        e.y = botRow * T - e.h;
        e.vy = 0;
        e.grounded = true;
        break;
      }
    }

    // Jump enemy
    if (e.style === 'jump' && e.grounded) {
      e.jumpTimer--;
      if (e.jumpTimer <= 0) {
        e.vy = -7;
        e.jumpTimer = 80 + Math.random() * 60;
      }
    }

    // Walk
    e.x += e.vx;
    e.animPhase += 0.05;

    // Wall check
    const col = e.vx < 0 ? Math.floor(e.x / T) : Math.floor((e.x + e.w) / T);
    const row = Math.floor((e.y + e.h/2) / T);
    if (isSolid(col, row)) {
      e.vx *= -1;
    }

    // Edge check (don't walk off platforms unless jumping type)
    if (e.grounded && e.style !== 'jump') {
      const frontCol = Math.floor((e.x + (e.vx < 0 ? -2 : e.w + 2)) / T);
      const belowRow = Math.floor((e.y + e.h + 4) / T);
      if (!isSolid(frontCol, belowRow) && !isPlatform(frontCol, belowRow)) {
        e.vx *= -1;
      }
    }
  }

  // Player collision
  if (!player.dead && invincibleTimer <= 0) {
    if (rectOverlap(player, e)) {
      if (starTimer > 0) {
        // Star power — destroy enemy
        e.alive = false;
        e.dead = true;
        score += 200;
        sfx.stomp();
        emit(e.x + e.w/2, e.y + e.h/2, '#ffff00', 12, 3, 20);
        addFloatingText(e.x + e.w/2, e.y, '+200', '#ffff00');
      } else if (player.vy > 0 && player.y + player.h - 8 < e.y + e.h/2) {
        // Stomp!
        e.alive = false;
        e.squished = true;
        e.squishTimer = 25;
        player.vy = -7;
        score += 100;
        sfx.stomp();
        emit(e.x + e.w/2, e.y + e.h/2, '#ff8800', 10, 2, 20);
        addFloatingText(e.x + e.w/2, e.y, '+100', '#ff8800');
        screenShake = 3;
      } else {
        // Hurt!
        killPlayer();
      }
    }
  }
}

// ============================================================
//  PARTICLES
// ============================================================
function emit(x, y, color, count, spread = 3, life = 30) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * spread * 2,
      vy: (Math.random() - 0.5) * spread * 2 - 1,
      life, maxLife: life,
      color,
      size: Math.random() * 4 + 1,
    });
  }
}

function emitTrail(x, y, color) {
  particles.push({
    x: x + (Math.random()-0.5)*8,
    y: y + (Math.random()-0.5)*4,
    vx: (Math.random()-0.5) * 0.5,
    vy: -Math.random() * 0.5,
    life: 15, maxLife: 15,
    color, size: Math.random() * 3 + 1,
  });
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 50, maxLife: 50 });
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.04;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  for (const d of brickDebris) {
    d.x += d.vx; d.y += d.vy;
    d.vy += 0.3;
    d.rotation += d.rotSpeed;
    d.life--;
  }
  brickDebris = brickDebris.filter(d => d.life > 0);

  for (const ft of floatingTexts) {
    ft.y -= 0.8;
    ft.life--;
  }
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

// ============================================================
//  CAMERA
// ============================================================
function updateCamera() {
  camTarget = player.x - W * 0.35;
  camTarget = Math.max(0, Math.min(camTarget, levelW * T - W));
  camX += (camTarget - camX) * 0.1;
}

// ============================================================
//  RENDERING
// ============================================================
const COLORS = {
  '#': { fill: '#5C4033', stroke: '#8B6914', top: '#A0825A' },     // Prehistoric earth/rock
  'B': { fill: '#7A6B5A', stroke: '#A09080', top: '#C0B0A0' },     // Fossil stone block
  '?': { fill: '#E8D8A0', stroke: '#F5E6B8', top: '#FFF8DC' },     // Dino egg block
  '?hit': { fill: '#6B6B6B', stroke: '#888', top: '#999' },        // Cracked empty egg
  'P': { fill: '#556B2F', stroke: '#6B8E23', top: '#9ACD32' },     // Prehistoric plant/fern
  'p': { fill: '#4A5D23', stroke: '#5A7A23', top: '#6B8E23' },     // Plant stem
  'S': { fill: '#440000', stroke: '#ff2200' },
  '-': { fill: '#3B3220', stroke: '#8B7D6B' },                     // Wooden platform
  'L': { fill: '#ff220033', stroke: '#ff4400' },                   // Lava (volcanic)
  'G': { fill: '#4A3728', stroke: '#FFD700', top: '#FFE44D' },     // Golden fossil goal
};

function render() {
  const sx = screenShake ? (Math.random()-0.5) * screenShake : 0;
  const sy = screenShake ? (Math.random()-0.5) * screenShake : 0;

  // Background gradient — prehistoric volcanic sky
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1A0A05');
  bg.addColorStop(0.3, '#2A1510');
  bg.addColorStop(0.6, '#1A2010');
  bg.addColorStop(1, '#0A1508');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Background parallax mountains
  drawBackground();

  ctx.save();
  ctx.translate(-camX + sx, sy);

  // Draw tiles
  const startCol = Math.max(0, Math.floor(camX / T) - 1);
  const endCol = Math.min(levelW, Math.ceil((camX + W) / T) + 1);

  for (let row = 0; row < levelH; row++) {
    for (let col = startCol; col < endCol; col++) {
      const tile = getTile(col, row);
      if (tile === '.' || ENTITY_MARKERS[tile]) continue;

      const x = col * T;
      const y = row * T;

      if (tile === 'L') {
        // Lava
        const lavaPhase = frameCount * 0.05 + col * 0.5;
        ctx.fillStyle = `rgba(255, ${30 + Math.sin(lavaPhase) * 30}, 0, 0.6)`;
        ctx.fillRect(x, y + Math.sin(lavaPhase) * 2, T, T);
        ctx.fillStyle = `rgba(255, ${80 + Math.sin(lavaPhase + 1) * 40}, 0, 0.3)`;
        ctx.fillRect(x, y, T, T);
        // Glow
        drawGlow(x + T/2, y, 40, 'rgba(255, 50, 0, 0.15)');
        continue;
      }

      if (tile === 'S') {
        // Spikes
        ctx.fillStyle = '#ff220088';
        ctx.beginPath();
        for (let i = 0; i < 3; i++) {
          const sx = x + i * (T/3);
          ctx.moveTo(sx, y + T);
          ctx.lineTo(sx + T/6, y + 4);
          ctx.lineTo(sx + T/3, y + T);
        }
        ctx.fill();
        ctx.strokeStyle = '#ff4400';
        ctx.lineWidth = 1;
        ctx.stroke();
        continue;
      }

      let colors;
      if (tile === '?') {
        const qb = questionBlocks.find(q => q.col === col && q.row === row);
        colors = (qb && qb.hit) ? COLORS['?hit'] : COLORS['?'];
      } else {
        colors = COLORS[tile] || COLORS['#'];
      }

      if (tile === '-') {
        // One-way platform
        ctx.fillStyle = colors.stroke;
        ctx.fillRect(x, y, T, 6);
        ctx.fillStyle = colors.stroke + '44';
        ctx.fillRect(x, y + 6, T, 2);
        continue;
      }

      if (tile === 'G') {
        // Goal block — pulsing
        const pulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
        ctx.fillStyle = colors.fill;
        ctx.fillRect(x, y, T, T);
        ctx.strokeStyle = colors.stroke;
        ctx.lineWidth = 2;
        ctx.shadowColor = colors.stroke;
        ctx.shadowBlur = 10 * pulse;
        ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
        ctx.shadowBlur = 0;
        // Star symbol
        ctx.fillStyle = colors.top;
        ctx.font = '32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('★', x + T/2, y + T/2 + 6);
        continue;
      }

      // Standard block
      ctx.fillStyle = colors.fill;
      ctx.fillRect(x, y, T, T);

      // Top edge highlight
      if (colors.top) {
        ctx.fillStyle = colors.top + '66';
        ctx.fillRect(x, y, T, 3);
      }

      // Border
      ctx.strokeStyle = colors.stroke;
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);

      // ? block — Dino egg with cracks and wobble
      if (tile === '?') {
        const qb = questionBlocks.find(q => q.col === col && q.row === row);
        if (!qb || !qb.hit) {
          // Egg shape
          const wobble = Math.sin(frameCount * 0.08 + col) * 1.5;
          ctx.save();
          ctx.translate(x + T/2, y + T/2 + wobble);
          ctx.fillStyle = '#FFF8DC';
          ctx.beginPath();
          ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#D2B48C';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Spots on egg
          ctx.fillStyle = '#E8C880';
          ctx.beginPath(); ctx.arc(-4, -4, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(5, 2, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(-2, 6, 2.5, 0, Math.PI * 2); ctx.fill();
          // ? symbol
          ctx.fillStyle = '#8B6914';
          ctx.font = 'bold 26px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('?', 0, 5);
          ctx.restore();
        } else {
          // Cracked empty egg
          ctx.fillStyle = '#999';
          ctx.beginPath();
          ctx.moveTo(x + 6, y + T/2);
          ctx.lineTo(x + 10, y + 8);
          ctx.lineTo(x + 16, y + T/2 - 2);
          ctx.lineTo(x + 22, y + 6);
          ctx.lineTo(x + 26, y + T/2);
          ctx.lineTo(x + 26, y + T - 4);
          ctx.lineTo(x + 6, y + T - 4);
          ctx.fill();
        }
      }

      // Brick — Fossil stone block with bone fragments
      if (tile === 'B') {
        // Stone cracks
        ctx.strokeStyle = '#5A4A3A';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + 3, y + T/2);
        ctx.lineTo(x + T - 3, y + T/2 + 2);
        ctx.moveTo(x + T/2, y + 3);
        ctx.lineTo(x + T/2 - 2, y + T/2);
        ctx.stroke();
        // Fossil bone fragment
        ctx.fillStyle = '#D2C8B0';
        ctx.beginPath();
        ctx.arc(x + 10, y + 10, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(x + 10, y + 8, 12, 4);
        ctx.beginPath();
        ctx.arc(x + 22, y + 10, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ground — Prehistoric earth with fern tops
      if (tile === '#') {
        // Rock texture specks
        ctx.fillStyle = '#7A6B5A44';
        ctx.fillRect(x + 5, y + 8, 3, 2);
        ctx.fillRect(x + 15, y + 18, 2, 3);
        ctx.fillRect(x + 24, y + 12, 2, 2);
        ctx.fillRect(x + 10, y + 24, 3, 2);
        // Fern/moss top if air above
        const above = getTile(col, row - 1);
        if (above === '.' || above === undefined || ENTITY_MARKERS[above]) {
          ctx.fillStyle = '#4A7A2E';
          ctx.fillRect(x, y, T, 5);
          ctx.fillStyle = '#5A9A3E';
          ctx.fillRect(x, y, T, 2);
          // Fern fronds
          ctx.fillStyle = '#5A9A3E';
          ctx.beginPath();
          ctx.moveTo(x + 4, y);
          ctx.lineTo(x + 6, y - 5);
          ctx.lineTo(x + 8, y);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(x + 14, y);
          ctx.lineTo(x + 16, y - 7);
          ctx.lineTo(x + 18, y);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(x + 24, y);
          ctx.lineTo(x + 26, y - 4);
          ctx.lineTo(x + 28, y);
          ctx.fill();
        }
      }

      // Pipe — Prehistoric plant / giant fern trunk
      if (tile === 'P') {
        // Leafy top
        ctx.fillStyle = '#6B8E23';
        ctx.beginPath();
        ctx.moveTo(x - 4, y + 6);
        ctx.quadraticCurveTo(x + T/2, y - 6, x + T + 4, y + 6);
        ctx.fill();
        ctx.fillStyle = '#556B2F';
        ctx.fillRect(x, y + 4, T, 6);
        ctx.strokeStyle = '#3B4A1A';
        ctx.lineWidth = 1;
        ctx.strokeRect(x - 2, y + 2, T + 4, 8);
        // Bark texture
        ctx.fillStyle = '#4A5D2344';
        ctx.fillRect(x + 4, y + 10, 2, T - 12);
        ctx.fillRect(x + T - 6, y + 10, 2, T - 12);
      }

      // Pipe body — fern trunk
      if (tile === 'p') {
        ctx.fillStyle = '#4A5D2333';
        ctx.fillRect(x + 4, y, 2, T);
        ctx.fillRect(x + T - 6, y, 2, T);
      }
    }
  }

  // --- Brick debris ---
  for (const d of brickDebris) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rotation);
    ctx.globalAlpha = d.life / 60;
    ctx.fillStyle = '#cc6622';
    ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.strokeStyle = '#dd8833';
    ctx.lineWidth = 1;
    ctx.strokeRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // --- Entities ---
  for (const e of entities) {
    if (e.type === 'coin' && !e.collected) {
      const bob = Math.sin(e.animPhase * 2) * 2;
      const rot = Math.sin(e.animPhase) * 0.15;
      ctx.save();
      ctx.translate(e.x + e.w/2, e.y + e.h/2 + bob);
      ctx.rotate(rot);
      // Glow
      drawGlow(0, 0, 30, 'rgba(255, 240, 220, 0.15)');
      // Bone shape — two knobs connected by a shaft
      ctx.fillStyle = '#F5E6D0';
      ctx.shadowColor = '#FFF8DC';
      ctx.shadowBlur = 10;
      // Left knob
      ctx.beginPath();
      ctx.arc(-14, -4, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-14, 4, 7, 0, Math.PI * 2);
      ctx.fill();
      // Shaft
      ctx.fillRect(-14, -5, 28, 10);
      // Right knob
      ctx.beginPath();
      ctx.arc(14, -4, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(14, 4, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Bone highlight
      ctx.fillStyle = '#FFF8DC44';
      ctx.fillRect(-10, -3, 20, 4);
      ctx.restore();
    }

    if (e.type === 'enemy') {
      drawEnemy(e);
    }

    if (e.type === 'flag') {
      drawFlag(e);
    }
  }

  // --- Particles ---
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // --- Player ---
  if (!(player.dead && deadTimer > 60)) {
    drawPlayer();
  }

  // --- Floating texts ---
  for (const ft of floatingTexts) {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 6;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // --- HUD ---
  drawHUD();

  // --- Overlays ---
  if (state === 'menu') drawMenu();
  if (state === 'dead') drawDeath();
  if (state === 'levelComplete') drawLevelComplete();

  // --- Screen transition (on top of everything) ---
  drawTransition();
}

function drawBackground() {
  // Parallax mountains
  const bgOffset = camX * 0.1;
  ctx.fillStyle = '#2A1A10';
  for (let i = 0; i < 12; i++) {
    const x = i * 120 - (bgOffset % 120) - 60;
    const h = 60 + Math.sin(i * 1.3 + 0.5) * 40;
    ctx.beginPath();
    ctx.moveTo(x, H * 0.75);
    ctx.lineTo(x + 60, H * 0.75 - h);
    ctx.lineTo(x + 120, H * 0.75);
    ctx.fill();
  }

  const bgOffset2 = camX * 0.2;
  ctx.fillStyle = '#1E2A12';
  for (let i = 0; i < 15; i++) {
    const x = i * 90 - (bgOffset2 % 90) - 45;
    const h = 40 + Math.sin(i * 2.1 + 1) * 25;
    ctx.beginPath();
    ctx.moveTo(x, H * 0.78);
    ctx.lineTo(x + 45, H * 0.78 - h);
    ctx.lineTo(x + 90, H * 0.78);
    ctx.fill();
  }

  // Stars
  ctx.fillStyle = '#ffffff22';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 73 + 17) % W + W - (camX * 0.02 % W)) % W;
    const sy = (i * 41 + 11) % (H * 0.6);
    const sz = (i % 3 === 0) ? 2 : 1;
    const twinkle = Math.sin(frameCount * 0.02 + i) * 0.3 + 0.5;
    ctx.globalAlpha = twinkle;
    ctx.fillRect(sx, sy, sz, sz);
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  if (invincibleTimer > 0 && invincibleTimer % 4 < 2) return;

  const { x, y, w, h, facing, grounded, vx, vy } = player;

  ctx.save();
  ctx.translate(x + w/2, y + h/2);
  ctx.scale(facing, 1);

  const starActive = starTimer > 0;
  const bodyCol = starActive ? ['#ff0', '#f0f', '#0ff', '#0f0'][Math.floor(frameCount / 4) % 4] : '#44BB44';
  const bellyCol = starActive ? '#FFD700' : '#A8E6A0';
  const spineCol = starActive ? '#FF8800' : '#228822';

  // --- Medium-build upright dino ---

  // Body — medium torso, not too fat, not too skinny
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.ellipse(0, h/8, w/3 + 2, h/3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = bellyCol;
  ctx.beginPath();
  ctx.ellipse(2, h/8 + 3, w/3 - 4, h/3 - 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Neck
  ctx.fillStyle = bodyCol;
  ctx.fillRect(-4, -h/4, 10, h/4);

  // Head — big and forward
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.ellipse(5, -h/3, 13, 10, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Snout / jaw
  ctx.beginPath();
  ctx.ellipse(16, -h/3 + 3, 9, 6, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Mouth line
  ctx.strokeStyle = '#1A6B1A';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(10, -h/3 + 6);
  ctx.lineTo(22, -h/3 + 5);
  ctx.stroke();

  // Teeth
  ctx.fillStyle = '#fff';
  ctx.fillRect(17, -h/3 + 5, 3, 3);
  ctx.fillRect(12, -h/3 + 6, 3, 3);

  // Nostril
  ctx.fillStyle = '#1A6B1A';
  ctx.beginPath();
  ctx.arc(22, -h/3 + 0, 2, 0, Math.PI * 2);
  ctx.fill();

  // Eye — big and expressive
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -h/3 - 4, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(10, -h/3 - 4, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(11, -h/3 - 6, 2, 0, Math.PI * 2);
  ctx.fill();

  // Back spines
  ctx.fillStyle = spineCol;
  for (let i = 0; i < 5; i++) {
    const sx = -3 - i * 4;
    const sy = -h/4 + 2 + i * 7;
    const ssize = 6 - i * 0.6;
    ctx.beginPath();
    ctx.moveTo(sx - ssize/2, sy);
    ctx.lineTo(sx, sy - ssize - 4);
    ctx.lineTo(sx + ssize/2, sy);
    ctx.fill();
  }

  // Tail — medium length
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.moveTo(-w/3, h/6);
  ctx.quadraticCurveTo(-w/2 - 10, h/8, -w/2 - 14, -h/8);
  ctx.quadraticCurveTo(-w/2 - 10, -h/8 + 6, -w/2 - 4, h/8 + 4);
  ctx.quadraticCurveTo(-w/3 - 2, h/6 + 6, -w/3, h/6 + 4);
  ctx.fill();
  // Tail spine tip
  ctx.fillStyle = spineCol;
  ctx.beginPath();
  ctx.moveTo(-w/2 - 12, -h/8 - 2);
  ctx.lineTo(-w/2 - 14, -h/8 - 10);
  ctx.lineTo(-w/2 - 8, -h/8);
  ctx.fill();

  // Legs — sturdy dino legs
  const legLen = h/4;
  if (grounded && Math.abs(vx) > 0.5) {
    const legOffset = Math.sin(player.walkCycle) * 6;
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-6, h/3 - 2, 8, legLen + legOffset);
    ctx.fillRect(4, h/3 - 2, 8, legLen - legOffset);
    // Clawed feet
    ctx.fillStyle = '#FFD700';
    const fy1 = h/3 - 2 + legLen + legOffset;
    const fy2 = h/3 - 2 + legLen - legOffset;
    ctx.beginPath();
    ctx.moveTo(-8, fy1); ctx.lineTo(-10, fy1 + 4); ctx.lineTo(-5, fy1);
    ctx.moveTo(-2, fy1); ctx.lineTo(0, fy1 + 5); ctx.lineTo(3, fy1);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, fy2); ctx.lineTo(1, fy2 + 4); ctx.lineTo(6, fy2);
    ctx.moveTo(9, fy2); ctx.lineTo(11, fy2 + 5); ctx.lineTo(14, fy2);
    ctx.fill();
  } else {
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-6, h/3 - 2, 8, legLen);
    ctx.fillRect(4, h/3 - 2, 8, legLen);
    ctx.fillStyle = '#FFD700';
    const fy = h/3 - 2 + legLen;
    ctx.beginPath();
    ctx.moveTo(-8, fy); ctx.lineTo(-10, fy + 4); ctx.lineTo(-5, fy);
    ctx.moveTo(-2, fy); ctx.lineTo(0, fy + 5); ctx.lineTo(3, fy);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, fy); ctx.lineTo(1, fy + 4); ctx.lineTo(6, fy);
    ctx.moveTo(9, fy); ctx.lineTo(11, fy + 5); ctx.lineTo(14, fy);
    ctx.fill();
  }

  // Tiny T-Rex arms
  ctx.fillStyle = bodyCol;
  if (player.wallSliding) {
    ctx.fillRect(w/4, -h/10, 7, 5);
    ctx.fillRect(-w/4 - 5, -h/10, 7, 5);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(w/4 + 6, -h/10 + 4, 2, 2);
  } else if (!grounded) {
    const armFlail = Math.sin(frameCount * 0.3) * 4;
    ctx.fillRect(w/4, -h/10 + armFlail, 7, 5);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(w/4 + 6, -h/10 + 4 + armFlail, 2, 2);
  } else {
    ctx.fillRect(w/4, -h/10, 7, 5);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(w/4 + 6, -h/10 + 4, 2, 2);
  }

  // Big indicator — crown
  if (player.big) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(-2, -h/3 - 12);
    ctx.lineTo(-4, -h/3 - 22);
    ctx.lineTo(2, -h/3 - 16);
    ctx.lineTo(7, -h/3 - 24);
    ctx.lineTo(12, -h/3 - 16);
    ctx.lineTo(16, -h/3 - 22);
    ctx.lineTo(18, -h/3 - 12);
    ctx.fill();
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive && !e.squished) return;

  ctx.save();
  ctx.translate(e.x + e.w/2, e.y + e.h/2);

  if (e.squished) {
    ctx.scale(1.5, 0.3);
    ctx.globalAlpha = e.squishTimer / 25;
  }

  const eating = e.eatingTimer > 0;

  // Eating reaction — big happy puff up
  if (eating) {
    const puff = 1.4 + Math.sin(e.eatingTimer * 0.3) * 0.15;
    ctx.scale(puff, puff);
  }

  // --- Raptor (walker) ---
  if (e.style === 'walk') {
    // Body
    ctx.fillStyle = '#CC4400';
    ctx.beginPath();
    ctx.ellipse(0, 2, e.w/2 - 3, e.h/2 - 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Belly
    ctx.fillStyle = '#FFAA66';
    ctx.beginPath();
    ctx.ellipse(0, 5, e.w/2 - 7, e.h/2 - 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#CC4400';
    ctx.beginPath();
    ctx.arc(e.vx >= 0 ? 6 : -6, -6, 7, 0, Math.PI * 2);
    ctx.fill();
    // Snout with teeth
    const headX = e.vx >= 0 ? 6 : -6;
    const snoutDir = e.vx >= 0 ? 1 : -1;
    ctx.beginPath();
    ctx.ellipse(headX + snoutDir * 6, -5, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    ctx.fillRect(headX + snoutDir * 8, -4, 2, 2);
    ctx.fillRect(headX + snoutDir * 5, -4, 2, 2);
    // Feet waddle
    const waddle = Math.sin(e.animPhase * 2) * 3;
    ctx.fillStyle = '#993300';
    ctx.fillRect(-4, e.h/2 - 5, 5, 5 + waddle);
    ctx.fillRect(3, e.h/2 - 5, 5, 5 - waddle);
    // Claws
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-5, e.h/2 - 1 + waddle, 2, 2);
    ctx.fillRect(2, e.h/2 - 1 - waddle, 2, 2);
    // Tail
    ctx.fillStyle = '#CC4400';
    ctx.beginPath();
    ctx.moveTo(-snoutDir * 8, 2);
    ctx.quadraticCurveTo(-snoutDir * 14, -4, -snoutDir * 12, 6);
    ctx.quadraticCurveTo(-snoutDir * 10, 8, -snoutDir * 8, 5);
    ctx.fill();
    // Eyes & expression
    if (!e.squished) {
      if (eating) {
        // Happy closed eyes (^ ^)
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(headX + snoutDir * 1, -8, 3, Math.PI + 0.5, -0.5);
        ctx.stroke();
        // Happy open mouth with bone crumbs
        ctx.fillStyle = '#FF6644';
        ctx.beginPath();
        ctx.arc(headX + snoutDir * 6, -2, 4, 0, Math.PI);
        ctx.fill();
        // Bone crumbs
        ctx.fillStyle = '#F5E6D0';
        ctx.fillRect(headX + snoutDir * 4, -4, 2, 2);
        ctx.fillRect(headX + snoutDir * 9, -3, 2, 2);
      } else {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(headX + snoutDir * 1, -8, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(headX + snoutDir * 2, -8, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // --- Pterodactyl (flyer) ---
  if (e.style === 'fly') {
    // Body
    ctx.fillStyle = '#8844AA';
    ctx.beginPath();
    ctx.ellipse(0, 0, e.w/2 - 4, e.h/2 - 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head crest
    ctx.fillStyle = '#AA55CC';
    ctx.beginPath();
    ctx.moveTo(4, -8);
    ctx.lineTo(8, -14);
    ctx.lineTo(10, -6);
    ctx.fill();
    // Beak
    ctx.fillStyle = '#FFAA00';
    ctx.beginPath();
    ctx.moveTo(6, -2);
    ctx.lineTo(14, 0);
    ctx.lineTo(6, 2);
    ctx.fill();
    // Wings
    const wingFlap = Math.sin(e.animPhase * 3) * 10;
    ctx.fillStyle = '#6633AA';
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.lineTo(-e.w/2 - 10, -8 + wingFlap);
    ctx.lineTo(-e.w/2 - 4, 2 + wingFlap * 0.3);
    ctx.lineTo(-4, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.lineTo(e.w/2 + 10, -8 - wingFlap);
    ctx.lineTo(e.w/2 + 4, 2 - wingFlap * 0.3);
    ctx.lineTo(-4, 2);
    ctx.fill();
    // Membrane lines
    ctx.strokeStyle = '#8844AA44';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-4, 0);
    ctx.lineTo(-e.w/2 - 6, -4 + wingFlap * 0.5);
    ctx.moveTo(-4, 0);
    ctx.lineTo(e.w/2 + 6, -4 - wingFlap * 0.5);
    ctx.stroke();
    // Eyes & expression
    if (!e.squished) {
      if (eating) {
        // Happy squint
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(3, -4, 3, Math.PI + 0.5, -0.5);
        ctx.stroke();
        // Open beak with crumbs
        ctx.fillStyle = '#FFCC00';
        ctx.beginPath();
        ctx.moveTo(6, -3); ctx.lineTo(14, -2); ctx.lineTo(6, 0); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(6, 0); ctx.lineTo(14, 2); ctx.lineTo(6, 3); ctx.fill();
        ctx.fillStyle = '#F5E6D0';
        ctx.fillRect(10, -1, 2, 2);
      } else {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(3, -4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(4, -4, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // --- Triceratops (jumper) ---
  if (e.style === 'jump') {
    // Body
    ctx.fillStyle = '#CC8833';
    ctx.fillRect(-e.w/2 + 2, -e.h/2 + 4, e.w - 4, e.h - 6);
    ctx.fillStyle = '#AA6622';
    ctx.fillRect(-e.w/2 + 4, -e.h/2 + 6, e.w - 8, e.h - 10);
    // Frill/shield
    ctx.fillStyle = '#DDA844';
    ctx.beginPath();
    ctx.arc(0, -e.h/2 + 2, e.w/2 - 1, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#996622';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, -e.h/2 + 2, e.w/2 - 1, Math.PI, 0);
    ctx.stroke();
    // Frill dots
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(-6, -e.h/2 - 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -e.h/2 - 4, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -e.h/2 - 1, 2, 0, Math.PI * 2); ctx.fill();
    // Horns
    ctx.fillStyle = '#F5E6B8';
    ctx.beginPath();
    ctx.moveTo(-5, -e.h/2 + 6);
    ctx.lineTo(-7, -e.h/2 - 6);
    ctx.lineTo(-3, -e.h/2 + 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, -e.h/2 + 6);
    ctx.lineTo(7, -e.h/2 - 6);
    ctx.lineTo(3, -e.h/2 + 4);
    ctx.fill();
    // Nose horn
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.lineTo(0, -7);
    ctx.lineTo(3, -2);
    ctx.fill();
    // Legs
    ctx.fillStyle = '#CC8833';
    ctx.fillRect(-e.w/2 + 1, e.h/2 - 5, 6, 5);
    ctx.fillRect(e.w/2 - 7, e.h/2 - 5, 6, 5);
    // Eyes & expression
    if (!e.squished) {
      if (eating) {
        // Happy closed eyes
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(-5, -1, 3, Math.PI + 0.5, -0.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(5, -1, 3, Math.PI + 0.5, -0.5);
        ctx.stroke();
        // Munching mouth
        const chomp = Math.sin(e.eatingTimer * 0.8) > 0;
        ctx.fillStyle = '#885522';
        ctx.beginPath();
        ctx.arc(0, 6, chomp ? 4 : 2, 0, Math.PI);
        ctx.fill();
        // Crumbs
        ctx.fillStyle = '#F5E6D0';
        ctx.fillRect(-6, 5, 2, 2);
        ctx.fillRect(5, 4, 2, 2);
      } else {
        ctx.fillStyle = '#fff';
        ctx.fillRect(-7, -2, 5, 4);
        ctx.fillRect(3, -2, 5, 4);
        ctx.fillStyle = '#000';
        ctx.fillRect(-5, -1, 2, 3);
        ctx.fillRect(5, -1, 2, 3);
      }
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFlag(e) {
  // Pole
  ctx.fillStyle = '#888';
  ctx.fillRect(e.x + 4, e.y, 8, e.poleHeight);

  // Top ball
  ctx.fillStyle = '#ffdd00';
  ctx.shadowColor = '#ffdd00';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(e.x + 8, e.y, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Flag triangle
  const wave = Math.sin(frameCount * 0.06) * 6;
  ctx.fillStyle = flagReached ? '#00ff88' : '#ff0055';
  ctx.shadowColor = flagReached ? '#00ff88' : '#ff0055';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(e.x + 12, e.y + 8);
  ctx.lineTo(e.x + 72 + wave, e.y + 36);
  ctx.lineTo(e.x + 12, e.y + 64);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawGlow(x, y, r, color) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#44BB44';
  ctx.shadowBlur = 4;
  ctx.fillText(`SCORE ${score}`, 40, 60);
  ctx.shadowBlur = 0;

  // Coins
  ctx.fillStyle = '#ffdd00';
  ctx.font = '32px monospace';
  ctx.fillText(`★ ${coins}`, 40, 100);

  // Lives
  ctx.fillStyle = '#ff4488';
  ctx.fillText(`♥ ${lives}`, 40, 140);

  // Level
  ctx.fillStyle = '#ffffff88';
  ctx.font = '26px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`WORLD ${currentLevel + 1}-1`, W - 40, 60);

  // Star timer
  if (starTimer > 0) {
    ctx.fillStyle = ['#ff0', '#f0f', '#0ff'][Math.floor(frameCount / 5) % 3];
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`★ STAR POWER ${Math.ceil(starTimer / 60)}s ★`, W/2, 60);
  }

  // Power indicators
  if (player.big) {
    ctx.fillStyle = '#ff448888';
    ctx.font = '22px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('● BIG', W - 40, 100);
  }

  if (invincibleTimer > 0) {
    ctx.fillStyle = '#ffffff44';
    ctx.font = '22px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`● INVULN ${Math.ceil(invincibleTimer / 60)}s`, W - 40, 130);
  }
}

// ============================================================
//  OVERLAY SCREENS
// ============================================================
function drawMenu() {
  ctx.fillStyle = 'rgba(5, 5, 15, 0.85)';
  ctx.fillRect(0, 0, W, H);

  // Title
  const pulse = Math.sin(frameCount * 0.03) * 3;
  ctx.font = 'bold 120px monospace';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 25;

  ctx.shadowColor = '#44BB44';
  ctx.fillStyle = '#44BB44';
  ctx.fillText('DINO', W/2 - 75, H * 0.28 + pulse);
  ctx.shadowColor = '#FFAA00';
  ctx.fillStyle = '#FFAA00';
  ctx.fillText('DASH', W/2 + 75, H * 0.28 + pulse);
  ctx.shadowBlur = 0;

  ctx.font = '30px monospace';
  ctx.fillStyle = '#ffffff66';
  ctx.fillText('A Prehistoric Platformer Adventure', W/2, H * 0.28 + 40);

  // Controls
  ctx.font = '26px monospace';
  const cy = H * 0.48;
  ctx.fillStyle = '#44BB4488';
  ctx.fillText('— CONTROLS —', W/2, cy);

  const ctrls = [
    ['← → or A D', 'Move'],
    ['SPACE / W / ↑', 'Jump'],
    ['SHIFT / X', 'Run'],
  ];
  ctrls.forEach(([key, desc], i) => {
    ctx.fillStyle = '#FFAA00aa';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(key, W/2 - 15, cy + 28 + i * 24);
    ctx.fillStyle = '#ffffffbb';
    ctx.font = '24px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(desc, W/2 + 15, cy + 28 + i * 24);
  });
  ctx.textAlign = 'center';

  // Tips
  ctx.font = '22px monospace';
  ctx.fillStyle = '#ffffff44';
  ctx.fillText('Stomp dinos from above! Crack eggs! Collect fossils!', W/2, H * 0.73);
  ctx.fillText(`${levels.length} levels to conquer`, W/2, H * 0.73 + 20);

  // Start
  if (Math.sin(frameCount * 0.06) > 0) {
    ctx.font = 'bold 36px monospace';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.fillText('PRESS SPACE TO START', W/2, H * 0.88);
    ctx.shadowBlur = 0;
  }
}

function drawDeath() {
  const alpha = Math.min(deadTimer / 30, 0.75);
  ctx.fillStyle = `rgba(15, 0, 0, ${alpha})`;
  ctx.fillRect(0, 0, W, H);

  if (deadTimer > 20) {
    ctx.font = 'bold 90px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0044';
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 15;
    ctx.fillText(lives > 0 ? 'OUCH!' : 'GAME OVER', W/2, H * 0.38);
    ctx.shadowBlur = 0;

    ctx.font = '40px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`SCORE: ${score}`, W/2, H * 0.5);

    if (lives > 0) {
      ctx.font = '30px monospace';
      ctx.fillStyle = '#ff4488';
      ctx.fillText(`${lives} ${lives === 1 ? 'life' : 'lives'} remaining`, W/2, H * 0.58);
    } else {
      ctx.font = '30px monospace';
      ctx.fillStyle = '#ff448888';
      ctx.fillText('No lives remaining — starting over', W/2, H * 0.58);
    }
  }

  if (deadTimer > 50 && Math.sin(frameCount * 0.06) > 0) {
    ctx.font = '32px monospace';
    ctx.fillStyle = '#ffffffcc';
    ctx.textAlign = 'center';
    ctx.fillText(lives > 0 ? 'PRESS SPACE TO RETRY' : 'PRESS SPACE TO RESTART', W/2, H * 0.8);
  }
}

function drawLevelComplete() {
  const alpha = Math.min(completeTimer / 30, 0.8);
  ctx.fillStyle = `rgba(0, 10, 5, ${alpha})`;
  ctx.fillRect(0, 0, W, H);

  if (completeTimer > 15) {
    const bounce = Math.max(0, Math.sin(completeTimer * 0.05) * (1 - completeTimer/200)) * 5;

    ctx.font = 'bold 90px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffaa';
    ctx.shadowColor = '#00ffaa';
    ctx.shadowBlur = 20;
    ctx.fillText('LEVEL CLEAR!', W/2, H * 0.33 + bounce);
    ctx.shadowBlur = 0;

    ctx.font = '40px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`SCORE: ${score}`, W/2, H * 0.48);

    ctx.font = '30px monospace';
    ctx.fillStyle = '#ffdd00';
    ctx.fillText(`★ ${coins} coins collected`, W/2, H * 0.56);

    if (currentLevel + 1 >= levels.length) {
      ctx.font = 'bold 44px monospace';
      ctx.fillStyle = '#ffff00';
      ctx.shadowColor = '#ffff00';
      ctx.shadowBlur = 10;
      ctx.fillText('★ ALL LEVELS COMPLETE! ★', W/2, H * 0.66);
      ctx.shadowBlur = 0;
      ctx.font = '26px monospace';
      ctx.fillStyle = '#ffffff88';
      ctx.fillText('You are a true Neon Runner champion!', W/2, H * 0.72);
    }
  }

  if (completeTimer > 80 && Math.sin(frameCount * 0.06) > 0) {
    ctx.font = '32px monospace';
    ctx.fillStyle = '#ffffffcc';
    ctx.textAlign = 'center';
    const txt = currentLevel + 1 >= levels.length ? 'PRESS SPACE (restart from last level)' : 'PRESS SPACE FOR NEXT LEVEL';
    ctx.fillText(txt, W/2, H * 0.85);
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop() {
  update();
  render();
  // Clear justPressed at end of frame
  for (const k in justPressed) justPressed[k] = false;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
