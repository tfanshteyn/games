<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RUNNER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas {
    image-rendering: pixelated;
    border: 2px solid #ff00ff33;
    border-radius: 4px;
    box-shadow: 0 0 40px #ff00ff22, 0 0 80px #00ffff11;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  NEON RUNNER — A Mario-style Platformer with Neon Aesthetics
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 960, H = 540;
canvas.width = W;
canvas.height = H;

function resize() {
  const scaleX = window.innerWidth * 0.96 / W;
  const scaleY = window.innerHeight * 0.94 / H;
  const scale = Math.min(scaleX, scaleY, 1.2);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
//  AUDIO ENGINE
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, dur, type = 'square', vol = 0.07) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

const sfx = {
  jump: () => { playTone(500, 0.1, 'sine', 0.1); setTimeout(() => playTone(700, 0.08, 'sine', 0.07), 40); },
  stomp: () => { playTone(300, 0.08, 'square', 0.1); setTimeout(() => playTone(600, 0.12, 'sine', 0.08), 30); },
  coin: () => { playTone(1200, 0.06, 'sine', 0.1); setTimeout(() => playTone(1600, 0.08, 'sine', 0.08), 50); },
  powerup: () => { [0,50,100,150].forEach((d,i) => setTimeout(() => playTone(500+i*200, 0.1, 'sine', 0.07), d)); },
  hit: () => { playTone(150, 0.25, 'sawtooth', 0.1); playTone(90, 0.3, 'square', 0.06); },
  die: () => { [0,100,200,300].forEach((d,i) => setTimeout(() => playTone(400-i*80, 0.15, 'square', 0.06), d)); },
  complete: () => { [0,100,200,300,400,500].forEach((d,i) => setTimeout(() => playTone(400+i*100, 0.2, 'triangle', 0.08), d)); },
  brick: () => { playTone(200, 0.05, 'square', 0.05); },
  spring: () => { playTone(300, 0.05, 'sine', 0.08); setTimeout(() => playTone(900, 0.15, 'sine', 0.1), 30); },
  flag: () => { [0,80,160,240,320,400,480,560].forEach((d,i) => setTimeout(() => playTone(500+i*50, 0.12, 'triangle', 0.06), d)); },
};

// ============================================================
//  GAME STATE
// ============================================================
let state = 'menu'; // menu, playing, dead, levelComplete
let lives = 3;
let coins = 0;
let score = 0;
let currentLevel = 0;
let frameCount = 0;
let screenShake = 0;
let deadTimer = 0;
let completeTimer = 0;
let invincibleTimer = 0;
let starTimer = 0;

// Camera
let camX = 0;
let camTarget = 0;

// ============================================================
//  INPUT
// ============================================================
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (state === 'menu' && (e.code === 'Space' || e.code === 'Enter')) { ensureAudio(); startLevel(0); }
  if (state === 'dead' && deadTimer > 50 && (e.code === 'Space' || e.code === 'Enter')) {
    if (lives > 0) startLevel(currentLevel);
    else { lives = 3; coins = 0; score = 0; startLevel(0); }
  }
  if (state === 'levelComplete' && completeTimer > 80 && (e.code === 'Space' || e.code === 'Enter')) {
    startLevel(currentLevel + 1);
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function isDown(action) {
  switch(action) {
    case 'left': return keys['ArrowLeft'] || keys['KeyA'];
    case 'right': return keys['ArrowRight'] || keys['KeyD'];
    case 'jump': return keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
    case 'run': return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX'];
  }
}
function wasPressed(action) {
  switch(action) {
    case 'jump': return justPressed['Space'] || justPressed['ArrowUp'] || justPressed['KeyW'];
  }
}

// ============================================================
//  TILE SYSTEM
// ============================================================
const T = 32; // tile size
const TILES = {
  '.': 'air',
  '#': 'ground',
  'B': 'brick',
  '?': 'question',
  'P': 'pipe_top',
  'p': 'pipe_body',
  'S': 'spike',
  'G': 'goal',
  '-': 'platform', // one-way platform
  '^': 'spring',
  'L': 'lava',
};

// Entity markers (placed via level data, removed from tiles)
const ENTITY_MARKERS = {
  '@': 'player_spawn',
  'c': 'coin',
  'e': 'enemy_walk',
  'f': 'enemy_fly',
  'j': 'enemy_jump',
  '*': 'powerup_star',
  'm': 'powerup_mushroom',
  'F': 'flag',
};

let levelTiles = [];
let levelW = 0;
let levelH = 0;
let entities = [];
let particles = [];
let questionBlocks = []; // track ? block states
let brickDebris = [];
let floatingTexts = [];
let flagReached = false;

// ============================================================
//  PLAYER
// ============================================================
const player = {
  x: 0, y: 0, w: 24, h: 32,
  vx: 0, vy: 0,
  grounded: false,
  facing: 1,
  big: false,
  running: false,
  animFrame: 0,
  animTimer: 0,
  coyoteTime: 0,
  jumpBuffered: false,
  jumpBufferTimer: 0,
  walkCycle: 0,
  dead: false,
  deadVy: 0,
  wallSliding: false,
  wallDir: 0,         // -1 = wall on left, 1 = wall on right
  wallJumpTimer: 0,   // briefly override input after wall jump
};

// ============================================================
//  LEVELS
// ============================================================
const levels = [];

// LEVEL 1 — Tutorial: flat ground, coins, no enemies, no gaps
levels.push(`

....................................................................................
....................................................................................
....................................................................................

###################..###############################################################
`);

// LEVEL 2 — Small gaps, a few coins, one easy enemy
levels.push(`

....................................................................................

################...##############..##########.##########.##...########..............
################...##############..######################.##...########.............
`);

// LEVEL 3 — Sky platforms
levels.push(`
....................................................................................
....................................................................................
...............c............c.c.c.........c...c...c..........F......................
..............---.......---------.........----------........###.....................
.......c.c..........c.........................................e.....................

...........e............####......e........e..------..........#.....................

########..........######..####..####..####..####..####..####.##..#####..............
########..LLLLLL..######..##########..########..........########..#####.............
`);

// LEVEL 4 — The gauntlet
levels.push(`
....................................................................................
....................................................................................
....................................................................................
....................c...c...c.......c.c.c.c........c...c...c.....F.................
.........c.c......---..---..---....---------......---.---.---...###................
........------.......................................e.e.e..............................
..........e.e....?*?....e.e....?c?c?....e.e....?*?....e.......####................
...@...e.......####..e.......####..####.......####..........e..###..G...............
####.e....####........####.........e....####.........####..####..##..####...........
#######...######..########...########...######..########..####..##..#####..........
#######...######..########...########...######..########..####..#########..........
......LLLLLL..........LLLLLL......LLLLLL..........LLLLLL.......LLLLLL..............
`);

// LEVEL 5 — Final challenge
levels.push(`
....................................................................................
....................................................................................
..c.c.c.c.c........c.c.c..........c.c.c.c.........c.c.c.c........F...............
.-----------......---------.......----------......----------.....###...............
.......................................e.e..........e.e.e.........e.................
..e.e.e.e.....?*?c?*?.e.e.e...?c?c?c?.........?*?c?*?c?.....#####................
...........e.........e.......e..........e....e...........e....##....................
...@....####..####..####..####..####..####..####..####..####.##....................
####..e.....e.....e.....e.....e.....e.....e.....e.....e.....##.......G.............
########..########..########..########..########..########..###..######.............
########..########..########..########..########..########..####..######............
....LLLLLLLLLL..LLLLLLLLLL..LLLLLLLLLL..LLLLLLLLLL..LLLLLLLLLL....................
`);


function parseLevel(idx) {
  if (idx >= levels.length) idx = levels.length - 1;
  currentLevel = idx;

  const raw = levels[idx].split('\n').filter(l => l.length > 0);
  levelH = raw.length;
  levelW = Math.max(...raw.map(r => r.length));
  levelTiles = [];
  entities = [];
  particles = [];
  questionBlocks = [];
  brickDebris = [];
  floatingTexts = [];
  flagReached = false;

  let spawnX = 2, spawnY = 2;

  for (let row = 0; row < levelH; row++) {
    levelTiles[row] = [];
    for (let col = 0; col < levelW; col++) {
      const ch = (raw[row] && raw[row][col]) || '.';

      if (ENTITY_MARKERS[ch]) {
        levelTiles[row][col] = '.';
        const ex = col * T + T/2;
        const ey = row * T + T/2;

        switch(ENTITY_MARKERS[ch]) {
          case 'player_spawn': spawnX = col * T + 4; spawnY = row * T; break;
          case 'coin': entities.push(createCoin(ex - T/2, ey - T/2)); break;
          case 'enemy_walk': entities.push(createEnemy(ex - T/2, ey - T/2, 'walk')); break;
          case 'enemy_fly': entities.push(createEnemy(ex - T/2, ey - T/2, 'fly')); break;
          case 'enemy_jump': entities.push(createEnemy(ex - T/2, ey - T/2, 'jump')); break;
          case 'powerup_star': entities.push({ type: 'hidden_star', x: col, y: row }); break;
          case 'powerup_mushroom': entities.push({ type: 'hidden_mushroom', x: col, y: row }); break;
          case 'flag': entities.push(createFlag(col * T, ey - T/2)); break;
        }
      } else {
        levelTiles[row][col] = ch;
        if (ch === '?') {
          questionBlocks.push({ col, row, hit: false, content: 'coin' });
        }
      }
    }
  }

  // Setup player
  player.x = spawnX;
  player.y = spawnY;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;
  player.facing = 1;
  player.dead = false;
  player.coyoteTime = 0;

  camX = Math.max(0, player.x - W * 0.3);
}

function createCoin(x, y) {
  return { type: 'coin', x, y, w: 20, h: 20, collected: false, animPhase: Math.random() * Math.PI * 2, floatBase: y };
}

function createEnemy(x, y, style) {
  return {
    type: 'enemy', style, x, y: y, w: 28, h: 28,
    vx: -1.2, vy: 0,
    alive: true, squished: false, squishTimer: 0,
    animPhase: Math.random() * Math.PI * 2,
    flyBase: y, flyPhase: Math.random() * Math.PI * 2,
    jumpTimer: style === 'jump' ? Math.random() * 100 : 0,
    grounded: false,
  };
}

function createFlag(x, y) {
  return { type: 'flag', x, y: y - T * 3, w: 8, h: T * 4, poleHeight: T * 4 };
}

// ============================================================
//  COLLISION HELPERS
// ============================================================
function getTile(col, row) {
  if (row < 0 || row >= levelH || col < 0 || col >= levelW) return '.';
  return levelTiles[row]?.[col] || '.';
}

function isSolid(col, row) {
  const t = getTile(col, row);
  return t === '#' || t === 'B' || t === '?' || t === 'P' || t === 'p';
}

function isPlatform(col, row) {
  return getTile(col, row) === '-';
}

function isHazard(col, row) {
  const t = getTile(col, row);
  return t === 'S' || t === 'L';
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
//  PHYSICS & LOGIC
// ============================================================
const GRAVITY = 0.45;
const MAX_FALL = 9;
const WALK_SPEED = 2.8;
const RUN_SPEED = 4.5;
const JUMP_FORCE = -9.5;
const FRICTION = 0.82;
const AIR_FRICTION = 0.92;
const ACCEL = 0.5;
const WALL_SLIDE_SPEED = 1.8;
const WALL_JUMP_FORCE_X = 5.5;
const WALL_JUMP_FORCE_Y = -8.5;

function startLevel(idx) {
  parseLevel(idx);
  state = 'playing';
  deadTimer = 0;
  completeTimer = 0;
  invincibleTimer = 0;
}

function update() {
  frameCount++;

  // Always update particles
  updateParticles();

  if (state === 'dead') { deadTimer++; return; }
  if (state === 'levelComplete') { completeTimer++; return; }
  if (state !== 'playing') return;

  if (screenShake > 0) screenShake *= 0.88;
  if (screenShake < 0.2) screenShake = 0;
  if (invincibleTimer > 0) invincibleTimer--;
  if (starTimer > 0) starTimer--;

  updatePlayer();
  updateEntities();
  updateCamera();

  // Clear justPressed
  for (const k in justPressed) justPressed[k] = false;
}

function touchingWall(obj, dir) {
  // Check if obj is pressed against a wall on the given side (-1=left, 1=right)
  const top = Math.floor(obj.y / T);
  const bot = Math.floor((obj.y + obj.h - 1) / T);
  const col = dir === -1
    ? Math.floor((obj.x - 1) / T)
    : Math.floor((obj.x + obj.w) / T);
  for (let r = top; r <= bot; r++) {
    if (isSolid(col, r)) return true;
  }
  return false;
}

function updatePlayer() {
  if (player.dead) return;

  const maxSpeed = isDown('run') ? RUN_SPEED : WALK_SPEED;

  // Wall jump timer — briefly limits input control after wall jump
  if (player.wallJumpTimer > 0) player.wallJumpTimer--;

  // Horizontal movement
  if (player.wallJumpTimer <= 0) {
    if (isDown('left')) {
      player.vx -= ACCEL;
      player.facing = -1;
    } else if (isDown('right')) {
      player.vx += ACCEL;
      player.facing = 1;
    }
  }

  player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

  if (!isDown('left') && !isDown('right') && player.wallJumpTimer <= 0) {
    player.vx *= player.grounded ? FRICTION : AIR_FRICTION;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Jump buffering
  if (wasPressed('jump')) {
    player.jumpBuffered = true;
    player.jumpBufferTimer = 8;
  }
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;
  else player.jumpBuffered = false;

  // Coyote time
  if (player.grounded) player.coyoteTime = 6;
  else if (player.coyoteTime > 0) player.coyoteTime--;

  // Wall slide detection
  player.wallSliding = false;
  player.wallDir = 0;
  if (!player.grounded && player.vy > 0) {
    if (isDown('left') && touchingWall(player, -1)) {
      player.wallSliding = true;
      player.wallDir = -1;
    } else if (isDown('right') && touchingWall(player, 1)) {
      player.wallSliding = true;
      player.wallDir = 1;
    }
  }

  // Jump — ground jump, wall jump, or coyote jump
  if (player.jumpBuffered) {
    if (player.grounded || player.coyoteTime > 0) {
      // Normal jump
      player.vy = JUMP_FORCE;
      player.grounded = false;
      player.coyoteTime = 0;
      player.jumpBuffered = false;
      sfx.jump();
      emit(player.x + player.w/2, player.y + player.h, '#00ffff', 6, 2, 15);
    } else if (player.wallSliding) {
      // Wall jump — launch away from wall
      player.vy = WALL_JUMP_FORCE_Y;
      player.vx = -player.wallDir * WALL_JUMP_FORCE_X;
      player.facing = -player.wallDir;
      player.wallSliding = false;
      player.jumpBuffered = false;
      player.wallJumpTimer = 8;
      sfx.jump();
      emit(player.x + player.w/2 + player.wallDir * 10, player.y + player.h/2, '#00ffff', 8, 2, 18);
    }
  }

  // Wall slide — cap fall speed
  if (player.wallSliding) {
    if (player.vy > WALL_SLIDE_SPEED) player.vy = WALL_SLIDE_SPEED;
    // Wall slide particles
    if (frameCount % 4 === 0) {
      const wx = player.wallDir === -1 ? player.x : player.x + player.w;
      emit(wx, player.y + player.h * 0.6, '#00ccff88', 3, 1, 10);
    }
  }

  // Variable jump height
  if (!isDown('jump') && player.vy < -3) {
    player.vy *= 0.85;
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Move X
  player.x += player.vx;
  resolveCollisionX(player);

  // Move Y
  const wasGrounded = player.grounded;
  player.grounded = false;
  player.y += player.vy;
  resolveCollisionY(player);

  // Fell into pit
  if (player.y > levelH * T + 100) {
    killPlayer();
  }

  // Hazard check
  const cx1 = Math.floor((player.x + 4) / T);
  const cx2 = Math.floor((player.x + player.w - 4) / T);
  const cy1 = Math.floor((player.y + 4) / T);
  const cy2 = Math.floor((player.y + player.h - 2) / T);
  for (let r = cy1; r <= cy2; r++) {
    for (let c = cx1; c <= cx2; c++) {
      if (isHazard(c, r)) {
        if (starTimer > 0) continue;
        killPlayer();
        return;
      }
    }
  }

  // Walk animation
  if (player.grounded && Math.abs(player.vx) > 0.3) {
    player.walkCycle += Math.abs(player.vx) * 0.12;
  }

  // Running trail
  if (Math.abs(player.vx) > 3.5 && player.grounded && frameCount % 3 === 0) {
    emitTrail(player.x + player.w/2, player.y + player.h, '#DD000044');
  }

  // Star sparkles
  if (starTimer > 0 && frameCount % 2 === 0) {
    emit(player.x + Math.random() * player.w, player.y + Math.random() * player.h,
      ['#ff0', '#f0f', '#0ff', '#0f0'][Math.floor(Math.random()*4)], 1, 1, 15);
  }

  // Keep in bounds
  if (player.x < 0) { player.x = 0; player.vx = 0; }
}

function resolveCollisionX(obj) {
  const top = Math.floor(obj.y / T);
  const bot = Math.floor((obj.y + obj.h - 1) / T);

  // Left
  const leftCol = Math.floor(obj.x / T);
  for (let r = top; r <= bot; r++) {
    if (isSolid(leftCol, r)) {
      obj.x = (leftCol + 1) * T;
      obj.vx = 0;
      break;
    }
  }

  // Right
  const rightCol = Math.floor((obj.x + obj.w - 1) / T);
  for (let r = top; r <= bot; r++) {
    if (isSolid(rightCol, r)) {
      obj.x = rightCol * T - obj.w;
      obj.vx = 0;
      break;
    }
  }
}

function resolveCollisionY(obj) {
  const left = Math.floor((obj.x + 2) / T);
  const right = Math.floor((obj.x + obj.w - 3) / T);

  if (obj.vy >= 0) {
    // Falling — check below
    const botRow = Math.floor((obj.y + obj.h) / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(c, botRow)) {
        obj.y = botRow * T - obj.h;
        obj.vy = 0;
        obj.grounded = true;
        return;
      }
      // One-way platforms (only when falling through from above)
      if (isPlatform(c, botRow)) {
        const prevBot = obj.y + obj.h - obj.vy;
        if (prevBot <= botRow * T + 2) {
          obj.y = botRow * T - obj.h;
          obj.vy = 0;
          obj.grounded = true;
          return;
        }
      }
    }
  } else {
    // Rising — check above (head bonk)
    const topRow = Math.floor(obj.y / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(c, topRow)) {
        obj.y = (topRow + 1) * T;
        obj.vy = 0;

        // Hit block from below
        if (obj === player) hitBlock(c, topRow);
        return;
      }
    }
  }
}

function hitBlock(col, row) {
  const tile = getTile(col, row);

  if (tile === '?') {
    const qb = questionBlocks.find(q => q.col === col && q.row === row && !q.hit);
    if (qb) {
      qb.hit = true;
      sfx.coin();
      screenShake = 3;

      // Check for hidden content
      const hidden = entities.find(e =>
        (e.type === 'hidden_star' || e.type === 'hidden_mushroom') && e.x === col && e.y === row
      );

      if (hidden) {
        if (hidden.type === 'hidden_star') {
          starTimer = 600; // 10 seconds of invincibility
          sfx.powerup();
          addFloatingText(col * T + T/2, row * T - 10, 'STAR!', '#ffff00');
          emit(col * T + T/2, row * T, '#ffff00', 15, 3, 30);
        } else {
          // Mushroom — grow big or extra life
          if (!player.big) {
            player.big = true;
            player.h = 44;
            player.y -= 12;
            sfx.powerup();
            addFloatingText(col * T + T/2, row * T - 10, 'BIG!', '#ff4488');
          } else {
            lives++;
            sfx.powerup();
            addFloatingText(col * T + T/2, row * T - 10, '1UP!', '#00ff88');
          }
          emit(col * T + T/2, row * T, '#ff4488', 12, 3, 25);
        }
        entities = entities.filter(e => e !== hidden);
      } else {
        // Regular coin from ? block
        coins++;
        score += 100;
        addFloatingText(col * T + T/2, row * T - 10, '+100', '#ffff00');
        emit(col * T + T/2, row * T, '#ffff00', 8, 2, 20);
      }
    }
  } else if (tile === 'B') {
    if (player.big) {
      // Break brick
      levelTiles[row][col] = '.';
      sfx.brick();
      screenShake = 4;
      score += 50;
      // Debris
      for (let i = 0; i < 6; i++) {
        brickDebris.push({
          x: col * T + Math.random() * T,
          y: row * T + Math.random() * T,
          vx: (Math.random() - 0.5) * 5,
          vy: -Math.random() * 6 - 2,
          size: 6 + Math.random() * 6,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.3,
          life: 60,
        });
      }
    } else {
      sfx.brick();
      screenShake = 2;
      // Bump animation via particles
      emit(col * T + T/2, row * T + T, '#ff660044', 4, 1, 10);
    }
  }
}

function killPlayer() {
  if (invincibleTimer > 0 || starTimer > 0) return;
  if (player.dead) return;

  if (player.big) {
    player.big = false;
    player.h = 32;
    invincibleTimer = 90;
    sfx.hit();
    screenShake = 8;
    emit(player.x + player.w/2, player.y + player.h/2, '#ff0044', 15, 3, 25);
    return;
  }

  player.dead = true;
  player.vy = -8;
  lives--;
  sfx.die();
  screenShake = 15;
  emit(player.x + player.w/2, player.y + player.h/2, '#ff0044', 25, 4, 40);

  setTimeout(() => {
    state = 'dead';
    deadTimer = 0;
  }, 800);
}

// ============================================================
//  ENTITIES
// ============================================================
function updateEntities() {
  for (const e of entities) {
    if (e.type === 'coin' && !e.collected) {
      e.animPhase += 0.06;
      e.y = e.floatBase + Math.sin(e.animPhase) * 3;

      // Collect
      if (rectOverlap(player, e)) {
        e.collected = true;
        coins++;
        score += 100;
        sfx.coin();
        emit(e.x + e.w/2, e.y + e.h/2, '#ffff00', 8, 2, 20);
        addFloatingText(e.x + e.w/2, e.y, '+100', '#ffff00');
        if (coins % 50 === 0) {
          lives++;
          sfx.powerup();
          addFloatingText(e.x + e.w/2, e.y - 20, '1UP!', '#00ff88');
        }
      }
    }

    if (e.type === 'enemy' && e.alive) {
      updateEnemy(e);
    }

    if (e.type === 'enemy' && e.squished) {
      e.squishTimer--;
      if (e.squishTimer <= 0) e.dead = true;
    }

    if (e.type === 'flag') {
      // Flag collision
      if (!flagReached && rectOverlap(player, { x: e.x - 10, y: e.y, w: 28, h: e.poleHeight })) {
        flagReached = true;
        const timeBonus = 500;
        score += timeBonus;
        sfx.flag();
        addFloatingText(e.x, e.y, `+${timeBonus}`, '#ffff00');

        setTimeout(() => {
          state = 'levelComplete';
          completeTimer = 0;
          sfx.complete();
        }, 500);
      }
    }
  }

  entities = entities.filter(e => {
    if (e.type === 'coin' && e.collected) return false;
    if (e.type === 'enemy' && e.dead) return false;
    if (e.type === 'enemy' && e.y > levelH * T + 200) return false;
    return true;
  });
}

function updateEnemy(e) {
  if (e.style === 'fly') {
    e.flyPhase += 0.03;
    e.y = e.flyBase + Math.sin(e.flyPhase) * 40;
    e.x += e.vx;
    e.animPhase += 0.08;
  } else {
    // Gravity
    e.vy += GRAVITY;
    if (e.vy > MAX_FALL) e.vy = MAX_FALL;
    e.y += e.vy;

    // Resolve Y
    e.grounded = false;
    const left = Math.floor(e.x / T);
    const right = Math.floor((e.x + e.w - 1) / T);
    const botRow = Math.floor((e.y + e.h) / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(c, botRow) || isPlatform(c, botRow)) {
        e.y = botRow * T - e.h;
        e.vy = 0;
        e.grounded = true;
        break;
      }
    }

    // Jump enemy
    if (e.style === 'jump' && e.grounded) {
      e.jumpTimer--;
      if (e.jumpTimer <= 0) {
        e.vy = -7;
        e.jumpTimer = 80 + Math.random() * 60;
      }
    }

    // Walk
    e.x += e.vx;
    e.animPhase += 0.05;

    // Wall check
    const col = e.vx < 0 ? Math.floor(e.x / T) : Math.floor((e.x + e.w) / T);
    const row = Math.floor((e.y + e.h/2) / T);
    if (isSolid(col, row)) {
      e.vx *= -1;
    }

    // Edge check (don't walk off platforms unless jumping type)
    if (e.grounded && e.style !== 'jump') {
      const frontCol = Math.floor((e.x + (e.vx < 0 ? -2 : e.w + 2)) / T);
      const belowRow = Math.floor((e.y + e.h + 4) / T);
      if (!isSolid(frontCol, belowRow) && !isPlatform(frontCol, belowRow)) {
        e.vx *= -1;
      }
    }
  }

  // Player collision
  if (!player.dead && invincibleTimer <= 0) {
    if (rectOverlap(player, e)) {
      if (starTimer > 0) {
        // Star power — destroy enemy
        e.alive = false;
        e.dead = true;
        score += 200;
        sfx.stomp();
        emit(e.x + e.w/2, e.y + e.h/2, '#ffff00', 12, 3, 20);
        addFloatingText(e.x + e.w/2, e.y, '+200', '#ffff00');
      } else if (player.vy > 0 && player.y + player.h - 8 < e.y + e.h/2) {
        // Stomp!
        e.alive = false;
        e.squished = true;
        e.squishTimer = 25;
        player.vy = -7;
        score += 100;
        sfx.stomp();
        emit(e.x + e.w/2, e.y + e.h/2, '#ff8800', 10, 2, 20);
        addFloatingText(e.x + e.w/2, e.y, '+100', '#ff8800');
        screenShake = 3;
      } else {
        // Hurt!
        killPlayer();
      }
    }
  }
}

// ============================================================
//  PARTICLES
// ============================================================
function emit(x, y, color, count, spread = 3, life = 30) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * spread * 2,
      vy: (Math.random() - 0.5) * spread * 2 - 1,
      life, maxLife: life,
      color,
      size: Math.random() * 4 + 1,
    });
  }
}

function emitTrail(x, y, color) {
  particles.push({
    x: x + (Math.random()-0.5)*8,
    y: y + (Math.random()-0.5)*4,
    vx: (Math.random()-0.5) * 0.5,
    vy: -Math.random() * 0.5,
    life: 15, maxLife: 15,
    color, size: Math.random() * 3 + 1,
  });
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 50, maxLife: 50 });
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.04;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  for (const d of brickDebris) {
    d.x += d.vx; d.y += d.vy;
    d.vy += 0.3;
    d.rotation += d.rotSpeed;
    d.life--;
  }
  brickDebris = brickDebris.filter(d => d.life > 0);

  for (const ft of floatingTexts) {
    ft.y -= 0.8;
    ft.life--;
  }
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

// ============================================================
//  CAMERA
// ============================================================
function updateCamera() {
  camTarget = player.x - W * 0.35;
  camTarget = Math.max(0, Math.min(camTarget, levelW * T - W));
  camX += (camTarget - camX) * 0.1;
}

// ============================================================
//  RENDERING
// ============================================================
const COLORS = {
  '#': { fill: '#8B4513', stroke: '#D2691E', top: '#CD853F' },     // Mario brown ground
  'B': { fill: '#C84C09', stroke: '#E8782A', top: '#F4A460' },     // Mario brick orange-brown
  '?': { fill: '#DAA520', stroke: '#FFD700', top: '#FFEC8B' },     // Mario gold ? block
  '?hit': { fill: '#6B6B6B', stroke: '#888', top: '#999' },        // Used block gray
  'P': { fill: '#228B22', stroke: '#32CD32', top: '#7CFC00' },     // Mario green pipe
  'p': { fill: '#1A6B1A', stroke: '#2AAF2A', top: '#32CD32' },     // Pipe body
  'S': { fill: '#440000', stroke: '#ff2200' },
  '-': { fill: '#222244', stroke: '#6666cc' },
  'L': { fill: '#ff220033', stroke: '#ff4400' },
  'G': { fill: '#003322', stroke: '#00ffaa', top: '#00ffcc' },
};

function render() {
  const sx = screenShake ? (Math.random()-0.5) * screenShake : 0;
  const sy = screenShake ? (Math.random()-0.5) * screenShake : 0;

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.4, '#0a0a25');
  bg.addColorStop(1, '#15082a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Background parallax mountains
  drawBackground();

  ctx.save();
  ctx.translate(-camX + sx, sy);

  // Draw tiles
  const startCol = Math.max(0, Math.floor(camX / T) - 1);
  const endCol = Math.min(levelW, Math.ceil((camX + W) / T) + 1);

  for (let row = 0; row < levelH; row++) {
    for (let col = startCol; col < endCol; col++) {
      const tile = getTile(col, row);
      if (tile === '.' || ENTITY_MARKERS[tile]) continue;

      const x = col * T;
      const y = row * T;

      if (tile === 'L') {
        // Lava
        const lavaPhase = frameCount * 0.05 + col * 0.5;
        ctx.fillStyle = `rgba(255, ${30 + Math.sin(lavaPhase) * 30}, 0, 0.6)`;
        ctx.fillRect(x, y + Math.sin(lavaPhase) * 2, T, T);
        ctx.fillStyle = `rgba(255, ${80 + Math.sin(lavaPhase + 1) * 40}, 0, 0.3)`;
        ctx.fillRect(x, y, T, T);
        // Glow
        drawGlow(x + T/2, y, 40, 'rgba(255, 50, 0, 0.15)');
        continue;
      }

      if (tile === 'S') {
        // Spikes
        ctx.fillStyle = '#ff220088';
        ctx.beginPath();
        for (let i = 0; i < 3; i++) {
          const sx = x + i * (T/3);
          ctx.moveTo(sx, y + T);
          ctx.lineTo(sx + T/6, y + 4);
          ctx.lineTo(sx + T/3, y + T);
        }
        ctx.fill();
        ctx.strokeStyle = '#ff4400';
        ctx.lineWidth = 1;
        ctx.stroke();
        continue;
      }

      let colors;
      if (tile === '?') {
        const qb = questionBlocks.find(q => q.col === col && q.row === row);
        colors = (qb && qb.hit) ? COLORS['?hit'] : COLORS['?'];
      } else {
        colors = COLORS[tile] || COLORS['#'];
      }

      if (tile === '-') {
        // One-way platform
        ctx.fillStyle = colors.stroke;
        ctx.fillRect(x, y, T, 6);
        ctx.fillStyle = colors.stroke + '44';
        ctx.fillRect(x, y + 6, T, 2);
        continue;
      }

      if (tile === 'G') {
        // Goal block — pulsing
        const pulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
        ctx.fillStyle = colors.fill;
        ctx.fillRect(x, y, T, T);
        ctx.strokeStyle = colors.stroke;
        ctx.lineWidth = 2;
        ctx.shadowColor = colors.stroke;
        ctx.shadowBlur = 10 * pulse;
        ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
        ctx.shadowBlur = 0;
        // Star symbol
        ctx.fillStyle = colors.top;
        ctx.font = '18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('★', x + T/2, y + T/2 + 6);
        continue;
      }

      // Standard block
      ctx.fillStyle = colors.fill;
      ctx.fillRect(x, y, T, T);

      // Top edge highlight
      if (colors.top) {
        ctx.fillStyle = colors.top + '66';
        ctx.fillRect(x, y, T, 3);
      }

      // Border
      ctx.strokeStyle = colors.stroke;
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);

      // ? block — Mario style with animated ? and eyes
      if (tile === '?') {
        const qb = questionBlocks.find(q => q.col === col && q.row === row);
        if (!qb || !qb.hit) {
          // Corner rivets
          ctx.fillStyle = colors.top;
          ctx.fillRect(x + 3, y + 3, 3, 3);
          ctx.fillRect(x + T - 6, y + 3, 3, 3);
          ctx.fillRect(x + 3, y + T - 6, 3, 3);
          ctx.fillRect(x + T - 6, y + T - 6, 3, 3);
          // Bouncing ? symbol
          const bounce = Math.sin(frameCount * 0.06 + col) * 1.5;
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 8;
          ctx.fillText('?', x + T/2, y + T/2 + 7 + bounce);
          ctx.shadowBlur = 0;
          // Eyes
          ctx.fillStyle = '#000';
          ctx.fillRect(x + 8, y + 7, 4, 4);
          ctx.fillRect(x + 20, y + 7, 4, 4);
          // Eye shine
          ctx.fillStyle = '#fff';
          ctx.fillRect(x + 9, y + 7, 2, 2);
          ctx.fillRect(x + 21, y + 7, 2, 2);
        } else {
          // Used block — sad empty face
          ctx.fillStyle = '#555';
          ctx.fillRect(x + 9, y + 11, 4, 3);
          ctx.fillRect(x + 19, y + 11, 4, 3);
          ctx.fillRect(x + 11, y + 21, 10, 2);
        }
      }

      // Brick — Mario style with mortar and face
      if (tile === 'B') {
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, y + T/2);
        ctx.lineTo(x + T, y + T/2);
        ctx.moveTo(x + T/2, y);
        ctx.lineTo(x + T/2, y + T/2);
        ctx.moveTo(x + T * 0.25, y + T/2);
        ctx.lineTo(x + T * 0.25, y + T);
        ctx.moveTo(x + T * 0.75, y + T/2);
        ctx.lineTo(x + T * 0.75, y + T);
        ctx.stroke();
        // Grumpy face
        ctx.fillStyle = '#6B3000';
        ctx.fillRect(x + 9, y + 9, 3, 3);
        ctx.fillRect(x + 20, y + 9, 3, 3);
        // Frown
        ctx.beginPath();
        ctx.moveTo(x + 11, y + 22);
        ctx.quadraticCurveTo(x + T/2, y + 19, x + 21, y + 22);
        ctx.strokeStyle = '#6B3000';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // Ground — Mario brown with grass top
      if (tile === '#') {
        ctx.fillStyle = colors.top + '33';
        ctx.fillRect(x + 5, y + 8, 2, 2);
        ctx.fillRect(x + 15, y + 18, 2, 2);
        ctx.fillRect(x + 24, y + 10, 2, 2);
        ctx.fillRect(x + 10, y + 24, 2, 2);
        // Green grass if air above
        const above = getTile(col, row - 1);
        if (above === '.' || above === undefined || ENTITY_MARKERS[above]) {
          ctx.fillStyle = '#228B22';
          ctx.fillRect(x, y, T, 5);
          ctx.fillStyle = '#32CD32';
          ctx.fillRect(x, y, T, 2);
          // Grass tufts
          ctx.fillStyle = '#32CD32';
          ctx.fillRect(x + 3, y - 2, 2, 3);
          ctx.fillRect(x + 14, y - 3, 2, 4);
          ctx.fillRect(x + 26, y - 2, 2, 3);
        }
      }

      // Pipe top — Mario style with lip overhang
      if (tile === 'P') {
        ctx.fillStyle = '#32CD32';
        ctx.fillRect(x - 2, y, T + 4, 8);
        ctx.strokeStyle = '#006400';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x - 2, y, T + 4, 8);
        // Highlight stripe
        ctx.fillStyle = '#7CFC0055';
        ctx.fillRect(x + 2, y + 2, 4, T - 4);
      }

      // Pipe body — vertical highlight
      if (tile === 'p') {
        ctx.fillStyle = '#7CFC0033';
        ctx.fillRect(x + 2, y, 4, T);
      }
    }
  }

  // --- Brick debris ---
  for (const d of brickDebris) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rotation);
    ctx.globalAlpha = d.life / 60;
    ctx.fillStyle = '#cc6622';
    ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.strokeStyle = '#dd8833';
    ctx.lineWidth = 1;
    ctx.strokeRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // --- Entities ---
  for (const e of entities) {
    if (e.type === 'coin' && !e.collected) {
      const pulse = Math.sin(e.animPhase * 2) * 0.15 + 0.85;
      const stretch = Math.abs(Math.cos(e.animPhase));
      ctx.save();
      ctx.translate(e.x + e.w/2, e.y + e.h/2);
      ctx.scale(stretch, 1);
      // Glow
      drawGlow(0, 0, 18, 'rgba(255, 230, 0, 0.2)');
      ctx.beginPath();
      ctx.arc(0, 0, 9 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#ffdd00';
      ctx.shadowColor = '#ffff00';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Inner
      ctx.beginPath();
      ctx.arc(0, 0, 5 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#ffaa00';
      ctx.fill();
      ctx.restore();
    }

    if (e.type === 'enemy') {
      drawEnemy(e);
    }

    if (e.type === 'flag') {
      drawFlag(e);
    }
  }

  // --- Particles ---
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // --- Player ---
  if (!(player.dead && deadTimer > 60)) {
    drawPlayer();
  }

  // --- Floating texts ---
  for (const ft of floatingTexts) {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 6;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // --- HUD ---
  drawHUD();

  // --- Overlays ---
  if (state === 'menu') drawMenu();
  if (state === 'dead') drawDeath();
  if (state === 'levelComplete') drawLevelComplete();
}

function drawBackground() {
  // Parallax mountains
  const bgOffset = camX * 0.1;
  ctx.fillStyle = '#0d0d20';
  for (let i = 0; i < 12; i++) {
    const x = i * 120 - (bgOffset % 120) - 60;
    const h = 60 + Math.sin(i * 1.3 + 0.5) * 40;
    ctx.beginPath();
    ctx.moveTo(x, H * 0.75);
    ctx.lineTo(x + 60, H * 0.75 - h);
    ctx.lineTo(x + 120, H * 0.75);
    ctx.fill();
  }

  const bgOffset2 = camX * 0.2;
  ctx.fillStyle = '#12122a';
  for (let i = 0; i < 15; i++) {
    const x = i * 90 - (bgOffset2 % 90) - 45;
    const h = 40 + Math.sin(i * 2.1 + 1) * 25;
    ctx.beginPath();
    ctx.moveTo(x, H * 0.78);
    ctx.lineTo(x + 45, H * 0.78 - h);
    ctx.lineTo(x + 90, H * 0.78);
    ctx.fill();
  }

  // Stars
  ctx.fillStyle = '#ffffff22';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 73 + 17) % W + W - (camX * 0.02 % W)) % W;
    const sy = (i * 41 + 11) % (H * 0.6);
    const sz = (i % 3 === 0) ? 2 : 1;
    const twinkle = Math.sin(frameCount * 0.02 + i) * 0.3 + 0.5;
    ctx.globalAlpha = twinkle;
    ctx.fillRect(sx, sy, sz, sz);
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  if (invincibleTimer > 0 && invincibleTimer % 4 < 2) return;

  const { x, y, w, h, facing, grounded, vx, vy } = player;

  ctx.save();
  ctx.translate(x + w/2, y + h/2);
  ctx.scale(facing, 1);

  const starActive = starTimer > 0;
  const hatCol = starActive ? ['#ff0', '#f0f', '#0ff', '#0f0'][Math.floor(frameCount / 4) % 4] : '#DD0000';
  const shirtCol = starActive ? ['#0f0', '#ff0', '#f0f', '#0ff'][Math.floor(frameCount / 4) % 4] : '#DD0000';
  const overallCol = starActive ? '#FFD700' : '#2244CC';
  const skinCol = '#FFCC99';

  // Overalls (lower body)
  ctx.fillStyle = overallCol;
  ctx.fillRect(-w/2 + 2, 0, w - 4, h/2 - 2);

  // Shirt (upper body)
  ctx.fillStyle = shirtCol;
  ctx.fillRect(-w/2 + 2, -h/2 + 8, w - 4, h/2 - 6);

  // Skin — face area
  ctx.fillStyle = skinCol;
  ctx.fillRect(-w/2 + 4, -h/4 - 1, w - 8, 10);

  // Cap
  ctx.fillStyle = hatCol;
  ctx.fillRect(-w/2 + 1, -h/2 + 2, w - 2, 8);
  // Cap brim
  ctx.fillRect(-w/2 - 1, -h/2 + 8, w + 2, 3);
  // Cap "M" emblem
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('M', 0, -h/2 + 9);

  // Eyes
  ctx.fillStyle = '#fff';
  const eyeY = -h/4 + 2;
  ctx.fillRect(1, eyeY, 5, 5);
  ctx.fillRect(-4, eyeY, 5, 5);
  // Pupils
  ctx.fillStyle = '#000';
  ctx.fillRect(3, eyeY + 1, 2, 3);
  ctx.fillRect(-2, eyeY + 1, 2, 3);

  // Mustache
  ctx.fillStyle = '#4A2800';
  ctx.fillRect(-5, eyeY + 6, 12, 2);

  // Overall buttons
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-3, 3, 2, 2);
  ctx.fillRect(2, 3, 2, 2);

  // Legs animation — brown shoes
  if (grounded && Math.abs(vx) > 0.5) {
    const legOffset = Math.sin(player.walkCycle) * 4;
    ctx.fillStyle = '#6B3000';
    ctx.fillRect(-w/2 + 3, h/2 - 4, 6, 4 + legOffset);
    ctx.fillRect(w/2 - 9, h/2 - 4, 6, 4 - legOffset);
  }

  // Wall slide pose
  if (player.wallSliding) {
    ctx.fillStyle = skinCol;
    // Arms reaching toward wall
    ctx.fillRect(-w/2 - 3, -h/2 + 10, 4, 8);
    ctx.fillRect(w/2 - 1, -h/2 + 10, 4, 8);
    // Knees bent — brown shoes
    ctx.fillStyle = '#6B3000';
    ctx.fillRect(-w/2 + 3, h/2 - 2, 6, 4);
    ctx.fillRect(w/2 - 9, h/2 - 2, 6, 4);
  }
  // Jump pose
  else if (!grounded) {
    ctx.fillStyle = skinCol;
    // Arms up
    ctx.fillRect(-w/2 - 3, -h/2 + 8, 4, 10);
    ctx.fillRect(w/2 - 1, -h/2 + 8, 4, 10);
  }

  // Big indicator — bigger cap
  if (player.big) {
    ctx.fillStyle = hatCol;
    ctx.fillRect(-w/2 - 1, -h/2 - 4, w + 2, 6);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('M', 0, -h/2 - 0);
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive && !e.squished) return;

  ctx.save();
  ctx.translate(e.x + e.w/2, e.y + e.h/2);

  if (e.squished) {
    ctx.scale(1.5, 0.3);
    ctx.globalAlpha = e.squishTimer / 25;
  }

  // --- Goomba-style walker ---
  if (e.style === 'walk') {
    // Brown mushroom body
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(0, -2, e.w/2 - 2, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#A0522D';
    ctx.beginPath();
    ctx.arc(0, -2, e.w/2 - 5, Math.PI, 0);
    ctx.fill();
    // Bottom / stem
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(-e.w/2 + 4, -2, e.w - 8, e.h/2);
    // Feet waddle
    const waddle = Math.sin(e.animPhase * 2) * 3;
    ctx.fillStyle = '#000';
    ctx.fillRect(-e.w/2 + 2, e.h/2 - 5, 8, 5 + waddle);
    ctx.fillRect(e.w/2 - 10, e.h/2 - 5, 8, 5 - waddle);
    // Eyes
    if (!e.squished) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-7, -6, 6, 6);
      ctx.fillRect(1, -6, 6, 6);
      ctx.fillStyle = '#000';
      ctx.fillRect(-5, -4, 3, 4);
      ctx.fillRect(3, -4, 3, 4);
      // Angry brows
      ctx.fillStyle = '#5C3000';
      ctx.save();
      ctx.translate(-4, -8);
      ctx.rotate(-0.3);
      ctx.fillRect(0, 0, 6, 2);
      ctx.restore();
      ctx.save();
      ctx.translate(4, -8);
      ctx.rotate(0.3);
      ctx.fillRect(-6, 0, 6, 2);
      ctx.restore();
      // Frown
      ctx.beginPath();
      ctx.moveTo(-5, 4);
      ctx.quadraticCurveTo(0, 1, 5, 4);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // --- Koopa-style flyer ---
  if (e.style === 'fly') {
    // Green shell body
    ctx.fillStyle = '#228B22';
    ctx.beginPath();
    ctx.arc(0, 0, e.w/2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#006400';
    ctx.beginPath();
    ctx.arc(0, 2, e.w/2 - 6, 0, Math.PI);
    ctx.fill();
    // Shell highlight
    ctx.fillStyle = '#32CD3244';
    ctx.beginPath();
    ctx.arc(-3, -3, 5, 0, Math.PI * 2);
    ctx.fill();
    // Wings
    const wingFlap = Math.sin(e.animPhase * 3) * 8;
    ctx.fillStyle = '#ffffffaa';
    ctx.beginPath();
    ctx.moveTo(-e.w/2, -4);
    ctx.lineTo(-e.w/2 - 8, -10 + wingFlap);
    ctx.lineTo(-e.w/2 - 2, -2 + wingFlap);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(e.w/2, -4);
    ctx.lineTo(e.w/2 + 8, -10 - wingFlap);
    ctx.lineTo(e.w/2 + 2, -2 - wingFlap);
    ctx.fill();
    // Eyes
    if (!e.squished) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-6, -6, 5, 5);
      ctx.fillRect(2, -6, 5, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(-4, -5, 2, 3);
      ctx.fillRect(4, -5, 2, 3);
    }
  }

  // --- Spiny-style jumper ---
  if (e.style === 'jump') {
    // Red spiky body
    ctx.fillStyle = '#CC0000';
    ctx.fillRect(-e.w/2 + 2, -e.h/2 + 2, e.w - 4, e.h - 4);
    ctx.fillStyle = '#880000';
    ctx.fillRect(-e.w/2 + 5, -e.h/2 + 5, e.w - 10, e.h - 10);
    // Spikes
    ctx.fillStyle = '#FFD700';
    for (let i = 0; i < 3; i++) {
      const sx = -8 + i * 8;
      ctx.beginPath();
      ctx.moveTo(sx, -e.h/2);
      ctx.lineTo(sx + 4, -e.h/2 - 8);
      ctx.lineTo(sx + 8, -e.h/2);
      ctx.fill();
    }
    // Side spikes
    ctx.beginPath();
    ctx.moveTo(-e.w/2, -4);
    ctx.lineTo(-e.w/2 - 6, 0);
    ctx.lineTo(-e.w/2, 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(e.w/2, -4);
    ctx.lineTo(e.w/2 + 6, 0);
    ctx.lineTo(e.w/2, 4);
    ctx.fill();
    // Eyes
    if (!e.squished) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-6, -4, 5, 5);
      ctx.fillRect(2, -4, 5, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(-4, -3, 2, 3);
      ctx.fillRect(4, -3, 2, 3);
      // Angry brows
      ctx.fillStyle = '#FF4400';
      ctx.fillRect(-7, -7, 6, 2);
      ctx.fillRect(1, -7, 6, 2);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFlag(e) {
  // Pole
  ctx.fillStyle = '#888';
  ctx.fillRect(e.x + 2, e.y, 4, e.poleHeight);

  // Top ball
  ctx.fillStyle = '#ffdd00';
  ctx.shadowColor = '#ffdd00';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(e.x + 4, e.y, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Flag triangle
  const wave = Math.sin(frameCount * 0.06) * 3;
  ctx.fillStyle = flagReached ? '#00ff88' : '#ff0055';
  ctx.shadowColor = flagReached ? '#00ff88' : '#ff0055';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(e.x + 6, e.y + 4);
  ctx.lineTo(e.x + 36 + wave, e.y + 18);
  ctx.lineTo(e.x + 6, e.y + 32);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawGlow(x, y, r, color) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 4;
  ctx.fillText(`SCORE ${score}`, 20, 32);
  ctx.shadowBlur = 0;

  // Coins
  ctx.fillStyle = '#ffdd00';
  ctx.font = '18px monospace';
  ctx.fillText(`★ ${coins}`, 20, 56);

  // Lives
  ctx.fillStyle = '#ff4488';
  ctx.fillText(`♥ ${lives}`, 20, 78);

  // Level
  ctx.fillStyle = '#ffffff88';
  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`WORLD ${currentLevel + 1}-1`, W - 20, 32);

  // Star timer
  if (starTimer > 0) {
    ctx.fillStyle = ['#ff0', '#f0f', '#0ff'][Math.floor(frameCount / 5) % 3];
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`★ STAR POWER ${Math.ceil(starTimer / 60)}s ★`, W/2, 32);
  }

  // Power indicators
  if (player.big) {
    ctx.fillStyle = '#ff448888';
    ctx.font = '12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('● BIG', W - 20, 52);
  }

  if (invincibleTimer > 0) {
    ctx.fillStyle = '#ffffff44';
    ctx.font = '12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`● INVULN ${Math.ceil(invincibleTimer / 60)}s`, W - 20, 68);
  }
}

// ============================================================
//  OVERLAY SCREENS
// ============================================================
function drawMenu() {
  ctx.fillStyle = 'rgba(5, 5, 15, 0.85)';
  ctx.fillRect(0, 0, W, H);

  // Title
  const pulse = Math.sin(frameCount * 0.03) * 3;
  ctx.font = 'bold 64px monospace';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 25;

  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.fillText('NEON', W/2 - 85, H * 0.28 + pulse);
  ctx.shadowColor = '#ff00ff';
  ctx.fillStyle = '#ff00ff';
  ctx.fillText('RUNNER', W/2 + 80, H * 0.28 + pulse);
  ctx.shadowBlur = 0;

  ctx.font = '16px monospace';
  ctx.fillStyle = '#ffffff66';
  ctx.fillText('A Neon Platformer Adventure', W/2, H * 0.28 + 40);

  // Controls
  ctx.font = '14px monospace';
  const cy = H * 0.48;
  ctx.fillStyle = '#00ffff88';
  ctx.fillText('— CONTROLS —', W/2, cy);

  const ctrls = [
    ['← → or A D', 'Move'],
    ['SPACE / W / ↑', 'Jump'],
    ['SHIFT / X', 'Run'],
  ];
  ctrls.forEach(([key, desc], i) => {
    ctx.fillStyle = '#ff00ffaa';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(key, W/2 - 15, cy + 28 + i * 24);
    ctx.fillStyle = '#ffffffbb';
    ctx.font = '13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(desc, W/2 + 15, cy + 28 + i * 24);
  });
  ctx.textAlign = 'center';

  // Tips
  ctx.font = '12px monospace';
  ctx.fillStyle = '#ffffff44';
  ctx.fillText('Stomp enemies from above! Hit ? blocks! Collect coins!', W/2, H * 0.73);
  ctx.fillText(`${levels.length} levels to conquer`, W/2, H * 0.73 + 20);

  // Start
  if (Math.sin(frameCount * 0.06) > 0) {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.fillText('PRESS SPACE TO START', W/2, H * 0.88);
    ctx.shadowBlur = 0;
  }
}

function drawDeath() {
  const alpha = Math.min(deadTimer / 30, 0.75);
  ctx.fillStyle = `rgba(15, 0, 0, ${alpha})`;
  ctx.fillRect(0, 0, W, H);

  if (deadTimer > 20) {
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0044';
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 15;
    ctx.fillText(lives > 0 ? 'OUCH!' : 'GAME OVER', W/2, H * 0.38);
    ctx.shadowBlur = 0;

    ctx.font = '22px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`SCORE: ${score}`, W/2, H * 0.5);

    if (lives > 0) {
      ctx.font = '16px monospace';
      ctx.fillStyle = '#ff4488';
      ctx.fillText(`${lives} ${lives === 1 ? 'life' : 'lives'} remaining`, W/2, H * 0.58);
    } else {
      ctx.font = '16px monospace';
      ctx.fillStyle = '#ff448888';
      ctx.fillText('No lives remaining — starting over', W/2, H * 0.58);
    }
  }

  if (deadTimer > 50 && Math.sin(frameCount * 0.06) > 0) {
    ctx.font = '18px monospace';
    ctx.fillStyle = '#ffffffcc';
    ctx.textAlign = 'center';
    ctx.fillText(lives > 0 ? 'PRESS SPACE TO RETRY' : 'PRESS SPACE TO RESTART', W/2, H * 0.8);
  }
}

function drawLevelComplete() {
  const alpha = Math.min(completeTimer / 30, 0.8);
  ctx.fillStyle = `rgba(0, 10, 5, ${alpha})`;
  ctx.fillRect(0, 0, W, H);

  if (completeTimer > 15) {
    const bounce = Math.max(0, Math.sin(completeTimer * 0.05) * (1 - completeTimer/200)) * 5;

    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffaa';
    ctx.shadowColor = '#00ffaa';
    ctx.shadowBlur = 20;
    ctx.fillText('LEVEL CLEAR!', W/2, H * 0.33 + bounce);
    ctx.shadowBlur = 0;

    ctx.font = '22px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`SCORE: ${score}`, W/2, H * 0.48);

    ctx.font = '16px monospace';
    ctx.fillStyle = '#ffdd00';
    ctx.fillText(`★ ${coins} coins collected`, W/2, H * 0.56);

    if (currentLevel + 1 >= levels.length) {
      ctx.font = 'bold 24px monospace';
      ctx.fillStyle = '#ffff00';
      ctx.shadowColor = '#ffff00';
      ctx.shadowBlur = 10;
      ctx.fillText('★ ALL LEVELS COMPLETE! ★', W/2, H * 0.66);
      ctx.shadowBlur = 0;
      ctx.font = '14px monospace';
      ctx.fillStyle = '#ffffff88';
      ctx.fillText('You are a true Neon Runner champion!', W/2, H * 0.72);
    }
  }

  if (completeTimer > 80 && Math.sin(frameCount * 0.06) > 0) {
    ctx.font = '18px monospace';
    ctx.fillStyle = '#ffffffcc';
    ctx.textAlign = 'center';
    const txt = currentLevel + 1 >= levels.length ? 'PRESS SPACE (restart from last level)' : 'PRESS SPACE FOR NEXT LEVEL';
    ctx.fillText(txt, W/2, H * 0.85);
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop() {
  update();
  render();
  // Clear justPressed at end of frame
  for (const k in justPressed) justPressed[k] = false;
  requestAnimationFrame(loop);
}
loop();
</script>
