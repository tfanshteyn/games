<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  VOID DRIFT — Neon Space Survival Shooter
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Resize to fill window
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- Constants ----
const PLAYER_RADIUS = 14;
const PLAYER_SPEED = 4.5;
const BULLET_SPEED = 10;
const BULLET_RADIUS = 3;
const BULLET_LIFE = 60;
const FIRE_RATE = 8; // frames between shots
const STAR_COUNT = 200;

// ---- State ----
let state = 'menu'; // menu | playing | shop | gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('voidDriftHigh') || '0', 10);
let wave = 0;
let waveTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// ---- Ship Skins ----
const SHIP_SKINS = [
  { id: 'default',  name: 'Viper',      fill: '#44ffaa', stroke: '#88ffcc', cockpit: '#aaffdd', engine: '#4488ff', glow: '#44ffaa', cost: 0 },
  { id: 'fire',     name: 'Inferno',     fill: '#ff6622', stroke: '#ffaa44', cockpit: '#ffdd88', engine: '#ff4400', glow: '#ff6622', cost: 500 },
  { id: 'ice',      name: 'Frostbite',   fill: '#44ccff', stroke: '#88ddff', cockpit: '#ccf0ff', engine: '#2266ff', glow: '#44ccff', cost: 500 },
  { id: 'purple',   name: 'Phantom',     fill: '#bb44ff', stroke: '#dd88ff', cockpit: '#eeccff', engine: '#8822cc', glow: '#bb44ff', cost: 1000 },
  { id: 'gold',     name: 'Sovereign',   fill: '#ffd700', stroke: '#ffe866', cockpit: '#fff8cc', engine: '#ff8c00', glow: '#ffd700', cost: 2000 },
  { id: 'void',     name: 'Void Walker', fill: '#ff2266', stroke: '#ff66aa', cockpit: '#ffaacc', engine: '#cc0044', glow: '#ff2266', cost: 5000 },
];
let unlockedSkins = JSON.parse(localStorage.getItem('voidDriftSkins') || '["default"]');
let activeSkinId = localStorage.getItem('voidDriftActiveSkin') || 'default';
let credits = parseInt(localStorage.getItem('voidDriftCredits') || '0', 10);
function getActiveSkin() { return SHIP_SKINS.find(s => s.id === activeSkinId) || SHIP_SKINS[0]; }
function saveData() {
  localStorage.setItem('voidDriftSkins', JSON.stringify(unlockedSkins));
  localStorage.setItem('voidDriftActiveSkin', activeSkinId);
  localStorage.setItem('voidDriftCredits', credits.toString());
}

// ---- Upgrades (per-run) ----
let upgrades = { speed: 0, fireRate: 0, damage: 0, maxHp: 0 };
const UPGRADE_DEFS = [
  { key: 'maxHp',    name: 'Hull Armor',   desc: '+1 Max HP',         icon: '+',  maxLevel: 5, baseCost: 80,  costMul: 1.6 },
  { key: 'speed',    name: 'Thrusters',    desc: '+0.5 Speed',        icon: '>',  maxLevel: 5, baseCost: 60,  costMul: 1.5 },
  { key: 'fireRate', name: 'Auto-Loader',  desc: 'Faster fire rate',  icon: 'F',  maxLevel: 5, baseCost: 70,  costMul: 1.5 },
  { key: 'damage',   name: 'Piercing',     desc: '+1 Bullet damage',  icon: 'D',  maxLevel: 3, baseCost: 150, costMul: 2.0 },
];
function getUpgradeCost(def) { return Math.floor(def.baseCost * Math.pow(def.costMul, upgrades[def.key])); }

// ---- Shop state ----
let shopButtons = []; // {x, y, w, h, action, type}
let shopScrollY = 0;

// ---- Input ----
const keys = {};
let mouseX = 0, mouseY = 0;
let mouseDown = false;
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (state === 'menu') startGame();
  if (state === 'gameover' && e.key === ' ') startGame();
  if (state === 'shop' && (e.key === 'Enter' || e.key === 'Escape' || e.key === ' ')) { closeShop(); spawnWave(); }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', e => {
  mouseDown = true;
  if (state === 'menu') startGame();
  if (state === 'gameover') startGame();
  if (state === 'shop') handleShopClick(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => mouseDown = false);

// Prevent context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ---- Virtual Joysticks (touch) ----
const JOYSTICK_RADIUS = 60;
const JOYSTICK_KNOB = 26;
const JOYSTICK_DEAD = 10;

const leftStick = { active: false, touchId: -1, baseX: 0, baseY: 0, knobX: 0, knobY: 0, dx: 0, dy: 0 };
const rightStick = { active: false, touchId: -1, baseX: 0, baseY: 0, knobX: 0, knobY: 0, dx: 0, dy: 0 };

function handleTouchStart(e) {
  e.preventDefault();
  if (state === 'menu') { startGame(); return; }
  if (state === 'gameover') { startGame(); return; }
  if (state === 'shop') { handleShopClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY); return; }

  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const tx = t.clientX, ty = t.clientY;
    const halfW = canvas.width / 2;

    if (tx < halfW && !leftStick.active) {
      leftStick.active = true;
      leftStick.touchId = t.identifier;
      leftStick.baseX = tx;
      leftStick.baseY = ty;
      leftStick.knobX = tx;
      leftStick.knobY = ty;
      leftStick.dx = 0;
      leftStick.dy = 0;
    } else if (tx >= halfW && !rightStick.active) {
      rightStick.active = true;
      rightStick.touchId = t.identifier;
      rightStick.baseX = tx;
      rightStick.baseY = ty;
      rightStick.knobX = tx;
      rightStick.knobY = ty;
      rightStick.dx = 0;
      rightStick.dy = 0;
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const stick = t.identifier === leftStick.touchId ? leftStick
                : t.identifier === rightStick.touchId ? rightStick : null;
    if (!stick) continue;

    let offX = t.clientX - stick.baseX;
    let offY = t.clientY - stick.baseY;
    const d = Math.hypot(offX, offY);
    if (d > JOYSTICK_RADIUS) {
      offX = (offX / d) * JOYSTICK_RADIUS;
      offY = (offY / d) * JOYSTICK_RADIUS;
    }
    stick.knobX = stick.baseX + offX;
    stick.knobY = stick.baseY + offY;
    stick.dx = offX / JOYSTICK_RADIUS;
    stick.dy = offY / JOYSTICK_RADIUS;
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier === leftStick.touchId) {
      leftStick.active = false;
      leftStick.touchId = -1;
      leftStick.dx = 0;
      leftStick.dy = 0;
    }
    if (t.identifier === rightStick.touchId) {
      rightStick.active = false;
      rightStick.touchId = -1;
      rightStick.dx = 0;
      rightStick.dy = 0;
    }
  }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

// ---- Stars (background) ----
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * 4000 - 2000,
    y: Math.random() * 4000 - 2000,
    size: 0.5 + Math.random() * 1.5,
    brightness: 0.3 + Math.random() * 0.7
  });
}

// ---- Player ----
let player = { x: 0, y: 0, angle: 0, hp: 5, maxHp: 5, fireTimer: 0, invuln: 0, powerUp: null, powerTimer: 0 };

// ---- Entity lists ----
let bullets = [];
let enemies = [];
let particles = [];
let powerUps = [];
let floatingTexts = [];
let boss = null; // only one boss at a time

// ---- Camera ----
let camX = 0, camY = 0;

// ---- Enemy types ----
const ENEMY_TYPES = {
  drone: { radius: 12, hp: 1, speed: 1.8, color: '#ff4466', score: 10, behavior: 'chase' },
  tank: { radius: 20, hp: 4, speed: 1.0, color: '#ff8844', score: 30, behavior: 'chase' },
  dasher: { radius: 10, hp: 1, speed: 0.8, color: '#ff44ff', score: 20, behavior: 'dash' },
  orbiter: { radius: 14, hp: 2, speed: 2.0, color: '#ffff44', score: 25, behavior: 'orbit' },
  shooter: { radius: 16, hp: 3, speed: 1.2, color: '#44ffff', score: 35, behavior: 'shoot' }
};

// ---- Power-up types ----
const POWER_TYPES = ['rapid', 'spread', 'shield', 'heal'];

// ---- Start / Reset ----
function startGame() {
  state = 'playing';
  score = 0;
  wave = 0;
  waveTimer = 120;
  upgrades = { speed: 0, fireRate: 0, damage: 0, maxHp: 0 };
  player = { x: 0, y: 0, angle: 0, hp: 5, maxHp: 5, fireTimer: 0, invuln: 60, powerUp: null, powerTimer: 0 };
  bullets = [];
  enemies = [];
  particles = [];
  powerUps = [];
  floatingTexts = [];
  boss = null;
}

function openShop() {
  state = 'shop';
  shopButtons = [];
}

function closeShop() {
  state = 'playing';
  waveTimer = 90;
}

// ---- Spawn wave ----
function spawnWave() {
  wave++;
  const isBossWave = wave % 5 === 0;

  if (isBossWave) {
    spawnBoss();
    addFloatingText('BOSS WAVE ' + wave, player.x, player.y - 60, '#ff2244', 120, 36);
    // Spawn a heal power-up to help the player
    const a = Math.random() * Math.PI * 2;
    powerUps.push({
      x: player.x + Math.cos(a) * 200,
      y: player.y + Math.sin(a) * 200,
      type: 'heal',
      timer: 900
    });
    return;
  }

  const count = Math.min(5 + wave * 2, 40);
  const types = Object.keys(ENEMY_TYPES);

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 500 + Math.random() * 300;
    let typeIdx = 0;
    if (wave >= 2) typeIdx = Math.floor(Math.random() * Math.min(types.length, 1 + Math.floor(wave / 2)));
    const type = types[typeIdx];
    const def = ENEMY_TYPES[type];

    enemies.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + Math.sin(angle) * dist,
      vx: 0, vy: 0,
      radius: def.radius,
      hp: def.hp + Math.floor(wave / 5),
      maxHp: def.hp + Math.floor(wave / 5),
      speed: def.speed + wave * 0.03,
      color: def.color,
      score: def.score,
      behavior: def.behavior,
      type: type,
      timer: Math.random() * 120,
      dashAngle: 0,
      dashCooldown: 0
    });
  }

  // Spawn power-up every other wave
  if (wave % 2 === 0) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 200;
    powerUps.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + Math.sin(angle) * dist,
      type: POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)],
      timer: 600
    });
  }

  addFloatingText('WAVE ' + wave, player.x, player.y - 60, '#fff', 90, 28);
}

// ---- Boss system ----
const BOSS_NAMES = ['SENTINEL', 'WARDEN', 'OVERLORD', 'DREADNOUGHT', 'VOID KING'];

function spawnBoss() {
  const bossLevel = Math.floor(wave / 5); // 1, 2, 3...
  const a = Math.random() * Math.PI * 2;
  const spawnDist = 500;

  boss = {
    x: player.x + Math.cos(a) * spawnDist,
    y: player.y + Math.sin(a) * spawnDist,
    vx: 0, vy: 0,
    radius: 40 + bossLevel * 5,
    hp: 30 + bossLevel * 20,
    maxHp: 30 + bossLevel * 20,
    speed: 1.0 + bossLevel * 0.15,
    color: '#ff2244',
    score: 200 + bossLevel * 100,
    level: bossLevel,
    name: BOSS_NAMES[Math.min(bossLevel - 1, BOSS_NAMES.length - 1)],
    timer: 0,
    phase: 'chase', // chase | spray | summon | dash
    phaseTimer: 0,
    phaseDuration: 180,
    dashAngle: 0,
    rotation: 0, // visual spin
    spawnCooldown: 0,
    // Attack speeds scale with level
    bulletRate: Math.max(15, 40 - bossLevel * 5),
    sprayCount: 8 + bossLevel * 4,
    summonCount: Math.min(2 + bossLevel, 8),
  };
}

function updateBoss() {
  if (!boss) return;
  const b = boss;
  b.timer++;
  b.rotation += 0.02;
  b.phaseTimer++;

  const a = angle(b, player);
  const d = dist(b, player);

  // Cycle through phases
  if (b.phaseTimer >= b.phaseDuration) {
    b.phaseTimer = 0;
    const phases = ['chase', 'spray', 'summon', 'dash'];
    const curIdx = phases.indexOf(b.phase);
    b.phase = phases[(curIdx + 1) % phases.length];
    b.phaseDuration = b.phase === 'dash' ? 60 : b.phase === 'spray' ? 90 : b.phase === 'summon' ? 120 : 180;
  }

  switch (b.phase) {
    case 'chase':
      // Move toward player, fire aimed shots
      b.vx = lerp(b.vx, Math.cos(a) * b.speed, 0.04);
      b.vy = lerp(b.vy, Math.sin(a) * b.speed, 0.04);
      if (b.timer % b.bulletRate === 0) {
        fireEnemyBullet(b.x, b.y, a);
        // Higher level bosses fire more bullets
        if (b.level >= 2) {
          fireEnemyBullet(b.x, b.y, a + 0.2);
          fireEnemyBullet(b.x, b.y, a - 0.2);
        }
        if (b.level >= 4) {
          fireEnemyBullet(b.x, b.y, a + 0.4);
          fireEnemyBullet(b.x, b.y, a - 0.4);
        }
      }
      break;

    case 'spray':
      // Slow down and spray bullets in a ring
      b.vx *= 0.95;
      b.vy *= 0.95;
      if (b.timer % 6 === 0) {
        const sprayAngle = b.timer * 0.3;
        for (let i = 0; i < 2; i++) {
          fireEnemyBullet(b.x, b.y, sprayAngle + i * Math.PI);
        }
      }
      break;

    case 'summon':
      // Summon minions, stay at distance
      if (d < 250) {
        b.vx = lerp(b.vx, Math.cos(a + Math.PI) * b.speed * 1.5, 0.05);
        b.vy = lerp(b.vy, Math.sin(a + Math.PI) * b.speed * 1.5, 0.05);
      } else {
        b.vx *= 0.96;
        b.vy *= 0.96;
      }
      if (b.phaseTimer === 30 && enemies.length < 20) {
        for (let i = 0; i < b.summonCount; i++) {
          const sa = (Math.PI * 2 / b.summonCount) * i;
          const sx = b.x + Math.cos(sa) * (b.radius + 30);
          const sy = b.y + Math.sin(sa) * (b.radius + 30);
          enemies.push({
            x: sx, y: sy, vx: Math.cos(sa) * 3, vy: Math.sin(sa) * 3,
            radius: 10, hp: 1, maxHp: 1,
            speed: 2.2, color: '#ff6688', score: 5,
            behavior: 'chase', type: 'drone',
            timer: Math.random() * 120, dashAngle: 0, dashCooldown: 0
          });
          addParticles(sx, sy, '#ff6688', 5, 3, 15);
        }
        addFloatingText('SUMMONING', b.x, b.y - b.radius - 20, '#ff6688', 40, 18);
      }
      break;

    case 'dash':
      // Charge at the player
      if (b.phaseTimer === 1) {
        b.dashAngle = a;
        addFloatingText('!', b.x, b.y - b.radius - 20, '#ff0000', 30, 32);
      }
      if (b.phaseTimer < 20) {
        // Windup - slow
        b.vx *= 0.9;
        b.vy *= 0.9;
      } else {
        // Charge
        b.vx = Math.cos(b.dashAngle) * b.speed * 5;
        b.vy = Math.sin(b.dashAngle) * b.speed * 5;
      }
      break;
  }

  b.x += b.vx;
  b.y += b.vy;

  // Boss collision with player
  if (dist(b, player) < b.radius + PLAYER_RADIUS && player.invuln <= 0) {
    if (player.powerUp === 'shield') {
      player.powerUp = null;
      player.powerTimer = 0;
      addParticles(player.x, player.y, '#44aaff', 15, 4, 30);
      addFloatingText('SHIELD BREAK', player.x, player.y - 30, '#44aaff', 50);
    } else {
      player.hp -= 2; // bosses hit harder
      player.invuln = 50;
      screenShake(10, 15);
      addParticles(player.x, player.y, '#ff4444', 25, 6, 35);
    }
    // Knockback
    const ka = angle(b, player);
    player.x += Math.cos(ka) * 30;
    player.y += Math.sin(ka) * 30;
    if (player.hp <= 0) { player.hp = 0; gameOver(); }
  }

  // Boss hit by player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const bl = bullets[i];
    if (!bl.friendly) continue;
    if (dist(bl, b) < b.radius + BULLET_RADIUS) {
      b.hp -= (1 + upgrades.damage);
      addParticles(bl.x, bl.y, '#ff4488', 4, 3, 15);
      bullets.splice(i, 1);
      if (b.hp <= 0) {
        killBoss();
        return;
      }
    }
  }
}

function killBoss() {
  const b = boss;
  score += b.score;
  addFloatingText('+' + b.score, b.x, b.y - 30, '#ffaa44', 60, 28);
  addFloatingText(b.name + ' DEFEATED', b.x, b.y - 60, '#44ffaa', 90, 24);
  // Big explosion
  for (let i = 0; i < 5; i++) {
    const ox = (Math.random() - 0.5) * b.radius;
    const oy = (Math.random() - 0.5) * b.radius;
    addParticles(b.x + ox, b.y + oy, '#ff2244', 15, 6, 50);
    addParticles(b.x + ox, b.y + oy, '#ff8844', 10, 5, 40);
    addParticles(b.x + ox, b.y + oy, '#ffdd44', 8, 4, 35);
  }
  screenShake(15, 25);
  // Drop a power-up
  powerUps.push({
    x: b.x, y: b.y,
    type: POWER_TYPES[Math.floor(Math.random() * (POWER_TYPES.length - 1))], // not heal
    timer: 900
  });
  boss = null;
}

function drawBoss() {
  if (!boss) return;
  const b = boss;

  // Outer rotating ring
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rotation);

  ctx.shadowColor = b.color;
  ctx.shadowBlur = 20;
  ctx.strokeStyle = b.color;
  ctx.lineWidth = 3;

  // Outer octagon
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI / 4) * i;
    const px = Math.cos(a) * b.radius;
    const py = Math.sin(a) * b.radius;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = b.color + '22';
  ctx.fill();
  ctx.stroke();

  // Inner spinning shape
  ctx.rotate(-b.rotation * 2);
  ctx.strokeStyle = '#ff8866';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i;
    const px = Math.cos(a) * b.radius * 0.55;
    const py = Math.sin(a) * b.radius * 0.55;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = '#ff886633';
  ctx.fill();
  ctx.stroke();

  // Core
  ctx.shadowColor = '#ff4466';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4466';
  ctx.beginPath();
  ctx.arc(0, 0, 8 + Math.sin(b.timer * 0.08) * 3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // Phase indicator spikes
  if (b.phase === 'spray') {
    ctx.globalAlpha = 0.3 + Math.sin(b.timer * 0.2) * 0.2;
    ctx.strokeStyle = '#ffaa44';
    ctx.lineWidth = 1;
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI / 6) * i + b.timer * 0.05;
      ctx.beginPath();
      ctx.moveTo(b.x + Math.cos(a) * (b.radius + 5), b.y + Math.sin(a) * (b.radius + 5));
      ctx.lineTo(b.x + Math.cos(a) * (b.radius + 20), b.y + Math.sin(a) * (b.radius + 20));
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  if (b.phase === 'dash' && b.phaseTimer < 20) {
    // Warning flash
    ctx.globalAlpha = 0.3 + Math.sin(b.timer * 0.5) * 0.3;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius + 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawBossHUD(W) {
  if (!boss) return;
  const b = boss;
  const barW = Math.min(400, W - 40);
  const barH = 16;
  const barX = (W - barW) / 2;
  const barY = 20;

  // Boss name
  ctx.fillStyle = '#ff4466';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(b.name + ' (Lv.' + b.level + ')', W / 2, barY - 4);

  // HP bar background
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);

  // HP bar fill with gradient
  const hpRatio = b.hp / b.maxHp;
  const grad = ctx.createLinearGradient(barX, 0, barX + barW * hpRatio, 0);
  grad.addColorStop(0, '#ff2244');
  grad.addColorStop(1, '#ff8844');
  ctx.fillStyle = grad;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);

  // Border
  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);

  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(b.hp + ' / ' + b.maxHp, W / 2, barY + barH - 3);
}

// ---- Helpers ----
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function lerp(a, b, t) { return a + (b - a) * t; }

function addParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: life * (0.5 + Math.random() * 0.5),
      maxLife: life,
      color,
      size: 1 + Math.random() * 3
    });
  }
}

function addFloatingText(text, x, y, color, life, size) {
  floatingTexts.push({ text, x, y, color, life, maxLife: life, size: size || 16 });
}

function screenShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeTimer = duration;
}

// ---- Shoot ----
function fireBullet(px, py, ang, spread) {
  const a = ang + (Math.random() - 0.5) * spread;
  bullets.push({
    x: px + Math.cos(a) * 20,
    y: py + Math.sin(a) * 20,
    vx: Math.cos(a) * BULLET_SPEED,
    vy: Math.sin(a) * BULLET_SPEED,
    life: BULLET_LIFE,
    friendly: true
  });
}

function fireEnemyBullet(ex, ey, ang) {
  bullets.push({
    x: ex + Math.cos(ang) * 20,
    y: ey + Math.sin(ang) * 20,
    vx: Math.cos(ang) * 5,
    vy: Math.sin(ang) * 5,
    life: 90,
    friendly: false
  });
}

// ---- Update ----
function update() {
  if (state !== 'playing') return;
  // Apply maxHp upgrade continuously
  player.maxHp = 5 + upgrades.maxHp;

  const W = canvas.width, H = canvas.height;

  // Player movement (keyboard + left joystick)
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  // Left joystick movement
  if (leftStick.active) {
    const mag = Math.hypot(leftStick.dx, leftStick.dy);
    if (mag > JOYSTICK_DEAD / JOYSTICK_RADIUS) {
      dx += leftStick.dx;
      dy += leftStick.dy;
    }
  }
  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    const spd = PLAYER_SPEED + upgrades.speed * 0.5;
    player.x += (dx / len) * spd;
    player.y += (dy / len) * spd;
  }

  // Player angle toward mouse or right joystick
  const rightAiming = rightStick.active && Math.hypot(rightStick.dx, rightStick.dy) > JOYSTICK_DEAD / JOYSTICK_RADIUS;
  if (rightAiming) {
    player.angle = Math.atan2(rightStick.dy, rightStick.dx);
  } else {
    player.angle = Math.atan2(mouseY - H / 2, mouseX - W / 2);
  }

  // Shooting (mouse click or right joystick)
  const isShooting = mouseDown || rightAiming;
  if (player.fireTimer > 0) player.fireTimer--;
  const baseFireRate = Math.max(2, FIRE_RATE - upgrades.fireRate);
  const fireRate = player.powerUp === 'rapid' ? Math.max(1, 3 - Math.floor(upgrades.fireRate / 2)) : baseFireRate;
  if (isShooting && player.fireTimer <= 0) {
    if (player.powerUp === 'spread') {
      for (let i = -2; i <= 2; i++) {
        fireBullet(player.x, player.y, player.angle + i * 0.15, 0.02);
      }
    } else {
      fireBullet(player.x, player.y, player.angle, 0.05);
    }
    player.fireTimer = fireRate;
  }

  // Invulnerability
  if (player.invuln > 0) player.invuln--;

  // Power-up timer
  if (player.powerTimer > 0) {
    player.powerTimer--;
    if (player.powerTimer <= 0) player.powerUp = null;
  }

  // Camera
  camX = lerp(camX, player.x, 0.1);
  camY = lerp(camY, player.y, 0.1);

  // Update boss
  updateBoss();

  // Wave management (boss counts as enemies alive)
  if (enemies.length === 0 && !boss) {
    waveTimer--;
    if (waveTimer <= 0) {
      if (wave > 0) {
        openShop();
        return;
      }
      spawnWave();
      waveTimer = 180;
    }
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    if (b.friendly) {
      // Hit enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (dist(b, e) < e.radius + BULLET_RADIUS) {
          e.hp -= (1 + upgrades.damage);
          addParticles(b.x, b.y, e.color, 5, 3, 20);
          bullets.splice(i, 1);
          if (e.hp <= 0) {
            score += e.score;
            addParticles(e.x, e.y, e.color, 20, 5, 40);
            addFloatingText('+' + e.score, e.x, e.y - 20, e.color, 40);
            screenShake(3, 6);
            enemies.splice(j, 1);
          }
          break;
        }
      }
    } else {
      // Hit player
      if (dist(b, player) < PLAYER_RADIUS + BULLET_RADIUS && player.invuln <= 0) {
        if (player.powerUp === 'shield') {
          player.powerUp = null;
          player.powerTimer = 0;
          addParticles(player.x, player.y, '#44aaff', 15, 4, 30);
          addFloatingText('SHIELD BREAK', player.x, player.y - 30, '#44aaff', 50);
        } else {
          player.hp--;
          player.invuln = 40;
          screenShake(6, 10);
          addParticles(player.x, player.y, '#ff4444', 15, 4, 30);
        }
        bullets.splice(i, 1);
        if (player.hp <= 0) gameOver();
      }
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.timer++;
    const a = angle(e, player);

    switch (e.behavior) {
      case 'chase':
        e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.05);
        e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.05);
        break;
      case 'dash':
        if (e.dashCooldown > 0) {
          e.dashCooldown--;
          e.vx *= 0.97;
          e.vy *= 0.97;
        } else if (dist(e, player) < 300) {
          e.dashAngle = a;
          e.vx = Math.cos(a) * e.speed * 6;
          e.vy = Math.sin(a) * e.speed * 6;
          e.dashCooldown = 90;
        } else {
          e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.03);
          e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.03);
        }
        break;
      case 'orbit':
        const orbitDist = 200;
        const d = dist(e, player);
        if (d > orbitDist + 50) {
          e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.05);
          e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.05);
        } else {
          const tangent = a + Math.PI / 2;
          e.vx = lerp(e.vx, Math.cos(tangent) * e.speed, 0.05);
          e.vy = lerp(e.vy, Math.sin(tangent) * e.speed, 0.05);
        }
        break;
      case 'shoot':
        e.vx = lerp(e.vx, Math.cos(a) * e.speed * 0.5, 0.03);
        e.vy = lerp(e.vy, Math.sin(a) * e.speed * 0.5, 0.03);
        if (e.timer % 80 === 0 && dist(e, player) < 500) {
          fireEnemyBullet(e.x, e.y, a);
        }
        break;
    }

    e.x += e.vx;
    e.y += e.vy;

    // Collide with player
    if (dist(e, player) < e.radius + PLAYER_RADIUS && player.invuln <= 0) {
      if (player.powerUp === 'shield') {
        player.powerUp = null;
        player.powerTimer = 0;
        addParticles(player.x, player.y, '#44aaff', 15, 4, 30);
        addFloatingText('SHIELD BREAK', player.x, player.y - 30, '#44aaff', 50);
      } else {
        player.hp--;
        player.invuln = 40;
        screenShake(8, 12);
        addParticles(player.x, player.y, '#ff4444', 20, 5, 30);
      }
      // Knockback enemy
      const ka = angle(player, e);
      e.vx = Math.cos(ka) * 8;
      e.vy = Math.sin(ka) * 8;
      if (player.hp <= 0) gameOver();
    }
  }

  // Update power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const p = powerUps[i];
    p.timer--;
    if (p.timer <= 0) { powerUps.splice(i, 1); continue; }
    if (dist(p, player) < 30) {
      if (p.type === 'heal') {
        player.hp = Math.min(player.hp + 2, player.maxHp);
        addFloatingText('+2 HP', player.x, player.y - 30, '#44ff44', 50, 20);
      } else {
        player.powerUp = p.type;
        player.powerTimer = 480; // 8 seconds
        const names = { rapid: 'RAPID FIRE', spread: 'SPREAD SHOT', shield: 'SHIELD' };
        addFloatingText(names[p.type], player.x, player.y - 30, '#44ffaa', 50, 20);
      }
      addParticles(p.x, p.y, '#44ffaa', 15, 3, 30);
      powerUps.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const t = floatingTexts[i];
    t.y -= 0.8;
    t.life--;
    if (t.life <= 0) floatingTexts.splice(i, 1);
  }

  // Screen shake
  if (shakeTimer > 0) shakeTimer--;
}

function gameOver() {
  state = 'gameover';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('voidDriftHigh', highScore.toString());
  }
  // Bank remaining score into persistent credits
  credits += score;
  saveData();
  addParticles(player.x, player.y, '#ff4444', 50, 8, 60);
  addParticles(player.x, player.y, '#ff8844', 30, 6, 50);
  screenShake(12, 20);
}

// ---- Draw ----
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, W, H);

  // Camera offset with shake
  let ox = W / 2 - camX;
  let oy = H / 2 - camY;
  if (shakeTimer > 0) {
    ox += (Math.random() - 0.5) * shakeIntensity * 2;
    oy += (Math.random() - 0.5) * shakeIntensity * 2;
  }

  ctx.save();
  ctx.translate(ox, oy);

  // Stars
  for (const s of stars) {
    const sx = ((s.x - camX * 0.3) % W + W) % W - W / 2 + camX;
    const sy = ((s.y - camY * 0.3) % H + H) % H - H / 2 + camY;
    ctx.globalAlpha = s.brightness * 0.6;
    ctx.fillStyle = '#aaccff';
    ctx.fillRect(sx, sy, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(40, 50, 80, 0.3)';
  ctx.lineWidth = 1;
  const gridSize = 80;
  const startX = Math.floor((camX - W / 2) / gridSize) * gridSize;
  const startY = Math.floor((camY - H / 2) / gridSize) * gridSize;
  for (let x = startX; x < camX + W / 2; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, camY - H / 2);
    ctx.lineTo(x, camY + H / 2);
    ctx.stroke();
  }
  for (let y = startY; y < camY + H / 2; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(camX - W / 2, y);
    ctx.lineTo(camX + W / 2, y);
    ctx.stroke();
  }

  // Power-ups
  for (const p of powerUps) {
    const glow = 0.5 + Math.sin(p.timer * 0.1) * 0.3;
    ctx.globalAlpha = p.timer < 60 ? p.timer / 60 : 1;
    ctx.shadowColor = '#44ffaa';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#44ffaa';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10 + glow * 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = { rapid: 'R', spread: 'S', shield: 'D', heal: '+' };
    ctx.fillText(icons[p.type], p.x, p.y);
    ctx.globalAlpha = 1;
  }

  // Bullets
  const bulletSkin = getActiveSkin();
  for (const b of bullets) {
    ctx.shadowColor = b.friendly ? bulletSkin.glow : '#ff4444';
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.friendly ? bulletSkin.stroke : '#ff6666';
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Enemies
  for (const e of enemies) {
    const hpRatio = e.hp / e.maxHp;

    // Glow
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 12;

    // Body
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 2;
    ctx.fillStyle = e.color + '33';
    ctx.beginPath();

    switch (e.type) {
      case 'drone':
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        break;
      case 'tank':
        drawHexagon(ctx, e.x, e.y, e.radius);
        break;
      case 'dasher':
        drawDiamond(ctx, e.x, e.y, e.radius);
        break;
      case 'orbiter':
        drawTriangle(ctx, e.x, e.y, e.radius, angle(e, player));
        break;
      case 'shooter':
        ctx.rect(e.x - e.radius, e.y - e.radius, e.radius * 2, e.radius * 2);
        break;
    }
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // HP bar
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - e.radius, e.y - e.radius - 8, e.radius * 2, 3);
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - e.radius, e.y - e.radius - 8, e.radius * 2 * hpRatio, 3);
    }

    // Inner detail
    ctx.fillStyle = e.color;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(e.x, e.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Boss
  drawBoss();

  // Player
  if (state === 'playing' || state === 'gameover') {
    const blink = player.invuln > 0 && Math.floor(player.invuln / 3) % 2;
    if (!blink) {
      const skin = getActiveSkin();

      // Engine glow
      const engineAngle = player.angle + Math.PI;
      ctx.shadowColor = skin.engine;
      ctx.shadowBlur = 20;
      ctx.fillStyle = skin.engine;
      ctx.globalAlpha = 0.4 + Math.random() * 0.3;
      ctx.beginPath();
      ctx.arc(
        player.x + Math.cos(engineAngle) * 16,
        player.y + Math.sin(engineAngle) * 16,
        5 + Math.random() * 4, 0, Math.PI * 2
      );
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      // Ship body
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.angle);

      // Shield visual
      if (player.powerUp === 'shield') {
        ctx.shadowColor = '#44aaff';
        ctx.shadowBlur = 15;
        ctx.strokeStyle = '#44aaff';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.01) * 0.2;
        ctx.beginPath();
        ctx.arc(0, 0, PLAYER_RADIUS + 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      // Ship triangle
      ctx.shadowColor = skin.glow;
      ctx.shadowBlur = 10;
      ctx.fillStyle = skin.fill;
      ctx.strokeStyle = skin.stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-12, -11);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-12, 11);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Cockpit
      ctx.fillStyle = skin.cockpit;
      ctx.beginPath();
      ctx.arc(4, 0, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Floating texts
  for (const t of floatingTexts) {
    ctx.globalAlpha = t.life / t.maxLife;
    ctx.fillStyle = t.color;
    ctx.font = `bold ${t.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ---- HUD ----
  if (state === 'playing') {
    // HP
    const hpBarW = 200;
    const hpBarH = 12;
    const hpX = 20;
    const hpY = 20;
    ctx.fillStyle = '#222';
    ctx.fillRect(hpX, hpY, hpBarW, hpBarH);
    const hpColor = player.hp > 2 ? '#44ff66' : player.hp > 1 ? '#ffaa44' : '#ff4444';
    ctx.fillStyle = hpColor;
    ctx.fillRect(hpX, hpY, hpBarW * (player.hp / player.maxHp), hpBarH);
    ctx.strokeStyle = '#666';
    ctx.strokeRect(hpX, hpY, hpBarW, hpBarH);

    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('HP', hpX, hpY + hpBarH + 16);

    // Power-up indicator
    if (player.powerUp) {
      const names = { rapid: 'RAPID FIRE', spread: 'SPREAD SHOT', shield: 'SHIELD' };
      ctx.fillStyle = '#44ffaa';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText(names[player.powerUp] + ' [' + Math.ceil(player.powerTimer / 60) + 's]', hpX, hpY + hpBarH + 36);
    }

    // Score
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(score.toLocaleString(), W - 20, 36);

    ctx.fillStyle = '#888';
    ctx.font = '12px sans-serif';
    ctx.fillText('WAVE ' + wave, W - 20, 54);

    // Boss HP bar
    drawBossHUD(W);

    if (isTouchDevice) {
      // Draw virtual joysticks
      drawJoystick(leftStick, '#44ffaa');
      drawJoystick(rightStick, '#ff6644');
    } else {
      // Crosshair (desktop only)
      ctx.strokeStyle = '#44ffaa';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mouseX - 18, mouseY);
      ctx.lineTo(mouseX - 8, mouseY);
      ctx.moveTo(mouseX + 8, mouseY);
      ctx.lineTo(mouseX + 18, mouseY);
      ctx.moveTo(mouseX, mouseY - 18);
      ctx.lineTo(mouseX, mouseY - 8);
      ctx.moveTo(mouseX, mouseY + 8);
      ctx.lineTo(mouseX, mouseY + 18);
      ctx.stroke();
    }
  }

  // ---- Menu ----
  if (state === 'menu') {
    drawMenu(W, H);
  }

  // ---- Game Over ----
  if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);

    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 56px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText('Score: ' + score.toLocaleString(), W / 2, H / 2 + 10);

    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ffaa44';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 45);
    } else {
      ctx.fillStyle = '#888';
      ctx.font = '18px sans-serif';
      ctx.fillText('Best: ' + highScore.toLocaleString(), W / 2, H / 2 + 45);
    }

    ctx.fillStyle = '#44ddff';
    ctx.font = '16px sans-serif';
    ctx.fillText('+' + score.toLocaleString() + ' credits banked!', W / 2, H / 2 + 75);

    ctx.fillStyle = '#888';
    ctx.font = '14px sans-serif';
    ctx.fillText('Total credits: ' + credits.toLocaleString(), W / 2, H / 2 + 98);

    ctx.fillStyle = '#44ffaa';
    ctx.font = '18px sans-serif';
    ctx.fillText('Click or press Space to retry', W / 2, H / 2 + 130);
  }

  // ---- Shop ----
  if (state === 'shop') {
    drawShop(W, H);
  }
}

function drawJoystick(stick, color) {
  if (!stick.active) return;
  // Base circle
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(stick.baseX, stick.baseY, JOYSTICK_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  // Knob
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(stick.knobX, stick.knobY, JOYSTICK_KNOB, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.8;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ---- Shop ----
function handleShopClick(cx, cy) {
  for (const btn of shopButtons) {
    if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
      if (btn.action) btn.action();
      return;
    }
  }
}

function drawShop(W, H) {
  shopButtons = [];
  ctx.fillStyle = 'rgba(5,5,15,0.92)';
  ctx.fillRect(0, 0, W, H);

  const panelW = Math.min(520, W - 40);
  const panelX = (W - panelW) / 2;
  let curY = 60;

  // Title
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SHOP', W / 2, curY);
  ctx.shadowBlur = 0;
  curY += 15;

  // Currency display
  ctx.fillStyle = '#ffaa44';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText('Score: ' + score.toLocaleString(), W / 2 - 100, curY += 30);
  ctx.fillStyle = '#44ddff';
  ctx.fillText('Credits: ' + credits.toLocaleString(), W / 2 + 100, curY);
  curY += 15;

  // Section: Upgrades
  ctx.fillStyle = '#888';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('UPGRADES', panelX, curY += 30);
  curY += 10;

  for (const def of UPGRADE_DEFS) {
    const level = upgrades[def.key];
    const maxed = level >= def.maxLevel;
    const cost = maxed ? 0 : getUpgradeCost(def);
    const canBuy = !maxed && score >= cost;
    const rowH = 50;

    // Background
    ctx.fillStyle = canBuy ? '#1a2a1a' : '#1a1a22';
    ctx.fillRect(panelX, curY, panelW, rowH);
    ctx.strokeStyle = canBuy ? '#44ffaa44' : '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(panelX, curY, panelW, rowH);

    // Icon
    ctx.fillStyle = canBuy ? '#44ffaa' : '#555';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.icon, panelX + 25, curY + 32);

    // Name & desc
    ctx.textAlign = 'left';
    ctx.fillStyle = canBuy ? '#fff' : '#777';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText(def.name, panelX + 50, curY + 22);
    ctx.fillStyle = canBuy ? '#aaa' : '#555';
    ctx.font = '12px sans-serif';
    ctx.fillText(def.desc, panelX + 50, curY + 40);

    // Level pips
    const pipX = panelX + panelW - 160;
    for (let i = 0; i < def.maxLevel; i++) {
      ctx.fillStyle = i < level ? '#44ffaa' : '#333';
      ctx.fillRect(pipX + i * 16, curY + 14, 12, 12);
      ctx.strokeStyle = '#44ffaa44';
      ctx.strokeRect(pipX + i * 16, curY + 14, 12, 12);
    }

    // Buy button
    const btnW = 70;
    const btnX = panelX + panelW - btnW - 5;
    const btnY = curY + rowH - 25;
    if (maxed) {
      ctx.fillStyle = '#555';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('MAX', btnX + btnW / 2, btnY + 13);
    } else {
      ctx.fillStyle = canBuy ? '#44ffaa' : '#333';
      ctx.fillRect(btnX, btnY, btnW, 20);
      ctx.fillStyle = canBuy ? '#000' : '#666';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(cost + ' pts', btnX + btnW / 2, btnY + 14);
      if (canBuy) {
        shopButtons.push({
          x: panelX, y: curY, w: panelW, h: rowH,
          action: () => {
            score -= cost;
            upgrades[def.key]++;
            if (def.key === 'maxHp') {
              player.maxHp = 5 + upgrades.maxHp;
              player.hp = Math.min(player.hp + 1, player.maxHp);
            }
          }
        });
      }
    }

    curY += rowH + 4;
  }

  // Section: Ship Skins
  curY += 15;
  ctx.fillStyle = '#888';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('SHIP SKINS', panelX, curY);
  curY += 10;

  const skinSize = 70;
  const skinGap = 10;
  const skinsPerRow = Math.floor((panelW + skinGap) / (skinSize + skinGap));
  const skinStartX = panelX + (panelW - skinsPerRow * (skinSize + skinGap) + skinGap) / 2;

  for (let i = 0; i < SHIP_SKINS.length; i++) {
    const skin = SHIP_SKINS[i];
    const col = i % skinsPerRow;
    const row = Math.floor(i / skinsPerRow);
    const sx = skinStartX + col * (skinSize + skinGap);
    const sy = curY + row * (skinSize + 30 + skinGap);

    const owned = unlockedSkins.includes(skin.id);
    const active = activeSkinId === skin.id;
    const canBuy = !owned && credits >= skin.cost;

    // Card background
    ctx.fillStyle = active ? '#1a2a2a' : '#12121e';
    ctx.fillRect(sx, sy, skinSize, skinSize + 25);
    ctx.strokeStyle = active ? skin.fill : owned ? '#444' : '#222';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(sx, sy, skinSize, skinSize + 25);

    // Draw mini ship
    ctx.save();
    ctx.translate(sx + skinSize / 2, sy + skinSize / 2 - 5);
    ctx.shadowColor = skin.glow;
    ctx.shadowBlur = 8;
    ctx.fillStyle = owned ? skin.fill : '#333';
    ctx.strokeStyle = owned ? skin.stroke : '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-10, -9);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-10, 9);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = owned ? skin.cockpit : '#444';
    ctx.beginPath();
    ctx.arc(3, 0, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Name
    ctx.fillStyle = owned ? '#ccc' : '#666';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(skin.name, sx + skinSize / 2, sy + skinSize + 13);

    // Status / action
    if (active) {
      ctx.fillStyle = skin.fill;
      ctx.font = 'bold 9px sans-serif';
      ctx.fillText('EQUIPPED', sx + skinSize / 2, sy + skinSize + 23);
    } else if (owned) {
      ctx.fillStyle = '#44ffaa';
      ctx.font = 'bold 9px sans-serif';
      ctx.fillText('EQUIP', sx + skinSize / 2, sy + skinSize + 23);
      shopButtons.push({
        x: sx, y: sy, w: skinSize, h: skinSize + 25,
        action: () => { activeSkinId = skin.id; saveData(); }
      });
    } else {
      ctx.fillStyle = canBuy ? '#ffaa44' : '#555';
      ctx.font = 'bold 9px sans-serif';
      ctx.fillText(skin.cost + ' cr', sx + skinSize / 2, sy + skinSize + 23);
      if (canBuy) {
        shopButtons.push({
          x: sx, y: sy, w: skinSize, h: skinSize + 25,
          action: () => { credits -= skin.cost; unlockedSkins.push(skin.id); activeSkinId = skin.id; saveData(); }
        });
      }
    }
  }

  const skinRows = Math.ceil(SHIP_SKINS.length / skinsPerRow);
  curY += skinRows * (skinSize + 30 + skinGap) + 15;

  // Continue button
  const btnW = 200;
  const btnH = 44;
  const btnX = (W - btnW) / 2;
  const btnY = Math.min(curY, H - 70);
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#44ffaa';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT WAVE', btnX + btnW / 2, btnY + 28);
  shopButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, action: () => { closeShop(); spawnWave(); } });

  // Hint
  ctx.fillStyle = '#555';
  ctx.font = '12px sans-serif';
  ctx.fillText('Press Enter / Space to continue', W / 2, btnY + btnH + 22);
}

function drawMenu(W, H) {
  // Animated background particles for menu
  const t = Date.now() * 0.001;

  // Title
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 72px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('VOID DRIFT', W / 2, H / 2 - 80);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#88aacc';
  ctx.font = '20px sans-serif';
  ctx.fillText('Survive the void. How long can you last?', W / 2, H / 2 - 30);

  // Controls
  ctx.fillStyle = '#666';
  ctx.font = '16px sans-serif';
  if (isTouchDevice) {
    ctx.fillText('Left thumb to move', W / 2, H / 2 + 30);
    ctx.fillText('Right thumb to aim & shoot', W / 2, H / 2 + 55);
  } else {
    ctx.fillText('WASD / Arrow Keys to move', W / 2, H / 2 + 30);
    ctx.fillText('Mouse to aim \u2022 Click to shoot', W / 2, H / 2 + 55);
  }

  // Start prompt
  const pulse = 0.6 + Math.sin(t * 3) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText('Tap anywhere to start', W / 2, H / 2 + 120);
  ctx.globalAlpha = 1;

  // High score & credits
  if (highScore > 0) {
    ctx.fillStyle = '#ffaa44';
    ctx.font = '16px sans-serif';
    ctx.fillText('High Score: ' + highScore.toLocaleString(), W / 2, H / 2 + 170);
  }
  if (credits > 0) {
    ctx.fillStyle = '#44ddff';
    ctx.font = '16px sans-serif';
    ctx.fillText('Credits: ' + credits.toLocaleString(), W / 2, H / 2 + 195);
  }
}

function drawHexagon(ctx, x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    const px = x + Math.cos(a) * r;
    const py = y + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawDiamond(ctx, x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x + r, y);
  ctx.lineTo(x, y + r);
  ctx.lineTo(x - r, y);
  ctx.closePath();
}

function drawTriangle(ctx, x, y, r, angle) {
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const a = angle + (Math.PI * 2 / 3) * i;
    const px = x + Math.cos(a) * r;
    const py = y + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// ---- Game Loop ----
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
